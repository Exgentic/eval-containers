[package]
name = "dock"
version = "0.1.0"
edition = "2024"
description = "A build system for AI agent evaluations"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
testcontainers = { version = "0.27", features = ["docker-compose"] }
tokio = { version = "1", features = ["full"] }
tempfile = "3"
