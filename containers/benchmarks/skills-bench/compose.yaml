include:
  - path: ../../compose/services.yaml

services:
  runner:
    extends:
      file: ../../compose/runner.yaml
      service: runner
    depends_on:
      otelcol:
        condition: service_healthy
      gateway:
        condition: service_healthy
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/evals/skills-bench-${EVAL_TASK_ID:?}--${EVAL_AGENT:-claude-code}:latest
    environment:
      BENCHMARK: skills-bench
      # Runtime skills toggle: off => the entrypoint deletes the staged skills
      # before the agent runs (the without-skills baseline). Default: on.
      EVAL_SKILLS: ${EVAL_SKILLS:-on}
