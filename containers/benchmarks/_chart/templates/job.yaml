{{- $v := include "eval.values" . | fromYaml -}}
{{- /* Per-task site sidecars: the chart self-resolves which sidecars to bring up
       from the benchmark's committed task-profiles map + the task id — no CLI, so
       `helm template --set task=<id>` alone selects them. Empty for benchmarks
       without a map. (benchmarks/RULES.md 24h.) */ -}}
{{- $taskmap := $.Files.Get (printf "task-profiles/%s.json" $v.benchmark) | default "{}" | fromJson -}}
{{- $active := index $taskmap (toString $v.task) | default list -}}
{{- if and ($v.perTask | default false) $v.datasetSize -}}
{{- fail "per-task benchmarks bake one eval image per task and cannot use a dataset (Indexed) Job — run one Job per task (omit datasetSize)" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  # A dataset eval (datasetSize set) is named <benchmark>-<agent>; a single-task
  # debug run keeps the task in the name so several can coexist.
  name: {{ if $v.datasetSize }}{{ $v.benchmark }}-{{ $v.agent }}{{ else }}{{ $v.benchmark }}-{{ $v.agent }}-task-{{ $v.task }}{{ end }}{{ $v.nameSuffix }}
  labels:
    {{- include "eval.labels" . | nindent 4 }}
spec:
  {{- if $v.queueName }}
  # Kueue manages this Job: it starts suspended and the controller unsuspends it
  # when the queue's quota admits it. Global concurrency lives in the ClusterQueue,
  # not in parallelism — so many sweeps share one budget instead of oversubscribing.
  suspend: true
  {{- end }}
  {{- if $v.datasetSize }}
  # The dataset IS the sweep: one completion index per example, k8s fans them out.
  completionMode: Indexed
  completions: {{ $v.datasetSize }}
  parallelism: {{ $v.parallelism | default $v.datasetSize }}
  {{- if $v.backoffLimitPerIndex }}
  backoffLimitPerIndex: {{ $v.backoffLimitPerIndex }}   # per-example retry (k8s ≥1.29)
  maxFailedIndexes: {{ $v.maxFailedIndexes | default $v.datasetSize }}
  {{- else }}
  backoffLimit: 0
  {{- end }}
  {{- else }}
  backoffLimit: 0
  {{- end }}
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: {{ $v.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "eval.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      shareProcessNamespace: true
      {{- with $v.serviceAccountName }}
      serviceAccountName: {{ . }}
      {{- end }}
      # otelcol + gateway are native sidecars (restartPolicy: Always), so k8s
      # starts them in order and holds the runner behind both — compose's graph:
      # otelcol started, then gateway healthy (its startupProbe), then runner.
      initContainers:
        {{- with $v.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $v.sidecars }}
        # Hold the runner until this task's active site sidecars accept connections
        # (`until true` exits at once when none are active).
        - name: wait-sidecars
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until{{- range $name, $sc := $v.sidecars }}{{- if has $name $active }} nc -z {{ $name }} {{ $sc.port }} &&{{- end }}{{- end }} true; do echo 'waiting for sidecars'; sleep 2; done"
        {{- end }}
        - name: otelcol
          restartPolicy: Always
          image: {{ include "eval.otelImage" $v }}
          imagePullPolicy: {{ $v.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: health,    containerPort: 13133 }
          # Sidecar (restartPolicy: Always): k8s holds later containers until
          # this startupProbe passes — probes otelcol's health_check (:13133).
          startupProbe:
            httpGet: { path: /, port: 13133 }
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            {{- include "eval.outputMount" $v | nindent 12 }}

        - name: gateway
          restartPolicy: Always
          image: {{ include "eval.gatewayImage" $v }}
          imagePullPolicy: {{ $v.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - { name: gateway, containerPort: 4000 }
          startupProbe:
            exec: { command: ["/opt/gateway/health"] }
            periodSeconds: 2
            failureThreshold: 60
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: eval-secrets, key: OPENAI_API_KEY }
            - name: OPENAI_API_BASE
              valueFrom:
                secretKeyRef: { name: eval-secrets, key: OPENAI_API_BASE }
            - { name: EVAL_MODEL,                  value: {{ $v.evalModel | quote }} }
            - { name: HOST,                        value: "127.0.0.1" }
            # shareProcessNamespace + sidecar pod model puts otelcol on localhost.
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://localhost:4318" }
            {{- with $v.maxBudget }}
            - { name: EVAL_MODEL_MAX_BUDGET, value: {{ . | quote }} }
            {{- end }}
            {{- with $v.litellmVersion }}
            - { name: EVAL_LITELLM_VERSION, value: {{ . | quote }} }
            {{- end }}
            {{- with $v.gatewayExtraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      containers:
        - name: runner
          image: {{ include "eval.runnerImage" $v }}
          imagePullPolicy: {{ $v.imagePullPolicy | default "IfNotPresent" }}
          command: ["/bin/bash", "-c"]
          # $? / $rc are the container's shell — Helm leaves them untouched
          # (they're not {{`{{ }}`}} actions). A few benchmarks override the
          # command (e.g. tau-bench runs python3 /app/agent.py). In Indexed mode
          # the task id IS the completion index (k8s injects JOB_COMPLETION_INDEX).
          {{- if $v.datasetSize }}
          args: [{{ printf "export EVAL_TASK_ID=\"$JOB_COMPLETION_INDEX\" TASK_ID=\"$JOB_COMPLETION_INDEX\"; %s" $v.runnerArgs | quote }}]
          {{- else }}
          args: [{{ $v.runnerArgs | quote }}]
          {{- end }}
          env:
            # Framework axes in BOTH namespaces, mirroring compose/services.yaml:
            # EVAL_* is canonical (read by /eval-entrypoint.sh + per-benchmark
            # /entrypoint.sh — incl. the task materialization that sets $TASK);
            # the bare names are the process-compose legacy path. Set both so the
            # run works regardless of which entrypoint the eval image uses.
            - { name: EVAL_BENCHMARK,              value: {{ $v.benchmark | quote }} }
            - { name: EVAL_AGENT,                  value: {{ $v.agent | quote }} }
            - { name: EVAL_MODEL,                  value: {{ $v.model | quote }} }
            - { name: EVAL_TASK_ID,                value: {{ $v.task | quote }} }
            - { name: EVAL_TIMEOUT,                value: {{ $v.timeout | quote }} }
            - { name: BENCHMARK,                   value: {{ $v.benchmark | quote }} }
            - { name: AGENT,                       value: {{ $v.agent | quote }} }
            - { name: MODEL,                       value: {{ $v.model | quote }} }
            - { name: TASK_ID,                     value: {{ $v.task | quote }} }
            - { name: TIMEOUT,                     value: {{ $v.timeout | quote }} }
            - { name: ANTHROPIC_BASE_URL,          value: "http://localhost:4000/anthropic" }
            - { name: OPENAI_BASE_URL,             value: "http://localhost:4000/openai/v1" }
            - { name: GOOGLE_GEMINI_BASE_URL,      value: "http://localhost:4000/genai" }
            - { name: ANTHROPIC_API_KEY,           value: "sk-proxy" }
            - { name: OPENAI_API_KEY,              value: "sk-proxy" }
            - { name: GEMINI_API_KEY,              value: "sk-proxy" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://localhost:4318" }
            {{- with $v.benchmarkVersion }}
            - { name: EVAL_BENCHMARK_VERSION, value: {{ . | quote }} }
            {{- end }}
            {{- with $v.agentVersion }}
            - { name: EVAL_AGENT_VERSION, value: {{ . | quote }} }
            {{- end }}
            {{- with $v.runnerExtraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $v.resources | nindent 12 }}
          volumeMounts:
            {{- include "eval.outputMount" $v | nindent 12 }}
            - { name: tmp,    mountPath: /tmp }
            - { name: logs,   mountPath: /logs }
            {{- with $v.runnerExtraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        - name: output
          {{- $v.outputVolume | default (dict "emptyDir" dict) | toYaml | nindent 10 }}
        - { name: tmp,    emptyDir: { medium: Memory, sizeLimit: 1Gi } }
        - { name: logs,   emptyDir: { medium: Memory, sizeLimit: 100Mi } }
        {{- with $v.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- range $v.extraManifests }}
---
{{ toYaml . }}
{{- end }}
{{/* Per-task website sidecars: a Deployment+Service for each catalog entry whose
     name is in $active — the chart self-resolves $active above from the
     benchmark's task-profiles map + the task id, so no CLI is involved. */}}
{{- range $name, $sc := $v.sidecars }}
{{- if has $name $active }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    benchmark: {{ $v.benchmark }}
    app: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        benchmark: {{ $v.benchmark }}
        app: {{ $name }}
    spec:
      {{- if $sc.shmSize }}
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: {{ $sc.shmSize }} }
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ $sc.image }}
          ports:
            - containerPort: {{ $sc.port }}
          {{- if $sc.shmSize }}
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    benchmark: {{ $v.benchmark }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $sc.port }}
      targetPort: {{ $sc.port }}
{{- end }}
{{- end }}
