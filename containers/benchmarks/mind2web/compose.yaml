include:
  - path: ../../compose/services.yaml

services:
  runner:
    extends:
      file: ../../compose/runner.yaml
      service: runner
    depends_on:
      otelcol:
        condition: service_healthy
      gateway:
        condition: service_healthy
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/evals/mind2web--${EVAL_AGENT:-claude-code}:latest
    environment:
      BENCHMARK: mind2web
