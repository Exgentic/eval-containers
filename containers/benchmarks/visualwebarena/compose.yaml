include:
  - path: ../../compose/services.yaml

services:
  runner:
    extends:
      file: ../../compose/runner.yaml
      service: runner
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/evals/visualwebarena--${EVAL_AGENT:-claude-code}:latest
    environment:
      BENCHMARK: visualwebarena
      TIMEOUT: "1800"
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: gateway,otelcol,localhost,127.0.0.1
      CLASSIFIEDS_URL: http://classifieds:80
      REDDIT_URL: http://reddit:80
      SHOPPING_URL: http://shopping:80
    depends_on:
      gateway:
        condition: service_healthy
      proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G

  proxy:
    image: mitmproxy/mitmproxy:latest
    command: >
      mitmdump
      --mode regular
      --listen-port 8080
      --set hardump=/output/network.har
    volumes:
      - output:/output
    networks:
      - internal
      - upstream

  classifieds:
    image: ghcr.io/web-arena-x/visualwebarena-classifieds:latest
    networks: [internal]

  reddit:
    image: ghcr.io/web-arena-x/visualwebarena-reddit:latest
    networks: [internal]

  shopping:
    image: ghcr.io/web-arena-x/visualwebarena-shopping:latest
    networks: [internal]
