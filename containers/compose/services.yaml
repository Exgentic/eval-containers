services:
  otelcol:
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/core/otel:latest
    volumes:
      - output:/output
    # Probe otelcol's health_check endpoint (:13133) so the gateway can gate on
    # `service_healthy` below. Same per-orchestrator pattern as the gateway's
    # /opt/gateway/health check. Image is alpine-based, so busybox wget exists.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:13133/"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 1s
    networks:
      - internal

  gateway:
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/models/${EVAL_GATEWAY_IMAGE:-gpt-5.4--bifrost}:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_API_BASE: ${OPENAI_API_BASE:?}
      EVAL_MODEL: ${EVAL_MODEL:-openai/azure/gpt-5.4}
      HOST: 0.0.0.0
      # Both gateway flavors emit OTel: bifrost via its native `otel`
      # plugin (collector_url derived from this in /opt/gateway/start),
      # litellm via the `otel` callback in config.yaml.template (reads
      # this env var directly). Spans land in /output/traces.jsonl via
      # the otelcol sidecar's file exporter.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4318
    healthcheck:
      test: ["CMD", "/opt/gateway/health"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
    depends_on:
      otelcol:
        condition: service_healthy
    networks:
      - internal
      - upstream

  runner:
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/evals/${EVAL_BENCHMARK:-aime}--${EVAL_AGENT:-claude-code}:latest
    environment:
      # Pass the runtime axes through as both EVAL_* (canonical — what
      # /entrypoint.sh and /usr/local/bin/run read) and bare names
      # (legacy — what process-compose.yaml + write-result read
      # internally). Until those internals migrate to EVAL_*, we set
      # both so the run is consistent regardless of which path produces
      # result.json.
      #
      # EVAL_BENCHMARK is deliberately NOT set here: the benchmark is fixed
      # by the image (every benchmark Dockerfile bakes `ENV
      # EVAL_BENCHMARK=<name>`, and the eval image is `FROM` it), so it is
      # not a runtime axis like agent/task/model. Setting it would clobber
      # the image's correct value with a generic default — and it is what
      # let a per-benchmark `oci://…/eval-<benchmark>` artifact stay
      # self-describing without the consumer repeating the benchmark.
      EVAL_AGENT: ${EVAL_AGENT:-claude-code}
      EVAL_MODEL: ${EVAL_GATEWAY_LABEL:-gpt-5.4-bifrost}
      EVAL_TASK_ID: ${EVAL_TASK_ID:-0}
      EVAL_TIMEOUT: ${EVAL_TIMEOUT:-300}
      BENCHMARK: ${EVAL_BENCHMARK:-aime}
      AGENT: ${EVAL_AGENT:-claude-code}
      MODEL: ${EVAL_GATEWAY_LABEL:-gpt-5.4-bifrost}
      TASK_ID: ${EVAL_TASK_ID:-0}
      TIMEOUT: ${EVAL_TIMEOUT:-300}
      ANTHROPIC_BASE_URL: http://gateway:4000/anthropic
      OPENAI_BASE_URL: http://gateway:4000/openai/v1
      GOOGLE_GEMINI_BASE_URL: http://gateway:4000/genai
      GEMINI_API_KEY: sk-proxy
      OPENAI_API_KEY: sk-proxy
      ANTHROPIC_API_KEY: sk-proxy
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4318
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - output:/output
    networks:
      - internal
    tmpfs:
      - /tmp:size=1G
      - /logs:size=100M
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

networks:
  internal:
    internal: true
  upstream: {}

volumes:
  output:
