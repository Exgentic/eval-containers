# Shared compose topology that per-benchmark `compose.yaml` files pull in
# verbatim with `include:` — the parts no benchmark overrides: the `otelcol`
# and `gateway` services, the `internal`/`upstream` networks, and the `output`
# volume. The `runner` service is NOT here: every benchmark must override its
# image and `BENCHMARK` env, and Compose forbids overriding an `include:`d
# service, so the runner template lives in `runner.yaml` and is pulled via
# `extends:` instead. See `.agents/compose/RULES.md` rule 8.
services:
  otelcol:
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/core/otel:latest
    volumes:
      - output:/output
    # Probe otelcol's health_check endpoint (:13133) so the gateway can gate on
    # `service_healthy` below. Same per-orchestrator pattern as the gateway's
    # /opt/gateway/health check. Image is alpine-based, so busybox wget exists.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:13133/"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 1s
    networks:
      - internal

  gateway:
    image: ${EVAL_REGISTRY:-ghcr.io/exgentic}/models/${EVAL_GATEWAY_IMAGE:-bifrost}:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?}
      OPENAI_API_BASE: ${OPENAI_API_BASE:?}
      # Generic gateways (bifrost/litellm/portkey, the default) read this
      # <provider>/<model> handle and ERROR if it's unset — no silent fallback
      # model. A pinned per-model image (EVAL_GATEWAY_IMAGE=<model>) bakes its
      # own model and ignores this.
      EVAL_MODEL: ${EVAL_MODEL}
      HOST: 0.0.0.0
      # Both gateway flavors emit OTel: bifrost via its native `otel`
      # plugin (collector_url derived from this in /opt/gateway/start),
      # litellm via the `otel` callback in config.yaml.template (reads
      # this env var directly). Spans land in /output/traces.jsonl via
      # the otelcol sidecar's file exporter.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4318
    healthcheck:
      test: ["CMD", "/opt/gateway/health"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
    depends_on:
      otelcol:
        condition: service_healthy
    networks:
      - internal
      - upstream

networks:
  internal:
    internal: true
  upstream: {}

volumes:
  output:
