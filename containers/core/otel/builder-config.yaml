# Custom collector build: only the 3 components our pipeline uses. Pinned to
# 0.154.0, whose transitive deps are CVE-clean natively (otel SDK 1.44.0 clears
# CVE-2026-29181; grpc 1.81.1 clears CVE-2026-33186), so no out-of-lockstep
# `replaces` are needed. Forcing the SDK ahead of the collector it was compiled
# against is what crashed the binary at startup — it builds, but aborts during
# telemetry init. The version moved off 0.105.0, so traces.jsonl is re-verified
# byte-for-byte against the replay fixtures, not assumed identical.
dist:
  name: otelcol
  description: "Minimal OTLP-in / file-out OpenTelemetry Collector for eval-containers."
  output_path: /build   # single new dir under an existing parent: OCB's mkdir is non-recursive
  version: "0.154.0"
  otelcol_version: "0.154.0"

# otlpreceiver is core; fileexporter + healthcheckextension are contrib-only
# (which is why plain otelcol-core can't replace this).
extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.154.0
receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.154.0
exporters:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/fileexporter v0.154.0
