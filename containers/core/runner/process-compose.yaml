# Single-container pipeline. Five processes:
#   otelcol → gateway → agent → verifier → result.
#
# This is the SINGLE-CONTAINER mode only — the in-process orchestrator for the
# -standalone bundle, where otelcol + gateway run in-process alongside the eval.
# It ships ONLY in core/standalone.Dockerfile; the lean eval base has neither
# process-compose nor this file. In compose / k8s, otelcol + gateway are sibling
# containers/pods the orchestrator started, so /usr/local/bin/run runs the
# agent → verifier → result sequence directly there — no in-container supervisor.
#
# URL contract (resolved by /usr/local/bin/run BEFORE process-compose starts, so
# plain $VAR refs in commands work uniformly):
#   ANTHROPIC_BASE_URL  http://127.0.0.1:4000/anthropic
#   OPENAI_BASE_URL     http://127.0.0.1:4000/openai
#
# The compose / k8s surfaces mirror the same five units across separate
# services/containers — compose/services.yaml and benchmarks/_chart — with the
# same dependency edges: command:→image:, readiness_probe:→healthcheck:/probe,
# 127.0.0.1→service-name DNS / Pod loopback.

version: "0.5"

processes:
  otelcol:
    command: /usr/local/bin/otelcol --config=/etc/otelcol/config.yaml
    readiness_probe:
      http_get:
        host: 127.0.0.1
        scheme: http
        port: 13133
        path: /
      initial_delay_seconds: 0
      period_seconds: 1
      timeout_seconds: 1
      failure_threshold: 30
    availability:
      restart: "no"
    log_location: /output/model/otelcol.log

  gateway:
    command: /opt/gateway/start
    readiness_probe:
      # Each gateway image bakes its own /opt/gateway/health that knows
      # the right path (bifrost: /api/health; litellm: /health/liveness).
      # exec keeps process-compose.yaml gateway-agnostic.
      exec:
        command: /opt/gateway/health
      initial_delay_seconds: 3
      period_seconds: 1
      timeout_seconds: 2
      failure_threshold: 60
    depends_on:
      otelcol:
        condition: process_healthy
    availability:
      restart: "no"
    log_location: /output/model/gateway.log

  agent:
    # The agent launch (non-root gosu, timeout, scrubbed env -i allow-list, raw
    # stdout/stderr redirection) lives in /usr/local/bin/run-agent — shared with
    # the lean base's runner sequence so rule 7's allow-list has one home.
    command: /usr/local/bin/run-agent
    depends_on:
      gateway:
        condition: process_healthy
    availability:
      restart: "no"

  verifier:
    command: bash /grade.sh
    depends_on:
      agent:
        condition: process_completed
    availability:
      restart: "no"
    log_location: /output/task/verifier.log

  result:
    command: /usr/local/bin/write-result
    depends_on:
      verifier:
        condition: process_completed
    availability:
      restart: "no"
      # When the result writer finishes, process-compose exits — so the
      # whole container exits cleanly. Without this, otelcol+gateway
      # (long-running daemons) would keep the container alive forever
      # in single-image mode. In compose/k8s modes the gateway+otelcol
      # are disabled via the overlay file, so this still terminates
      # correctly there.
      exit_on_end: true
    log_location: /output/task/result-writer.log
