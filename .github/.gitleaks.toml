# Gitleaks config for Eval Containers.
#
# Lives in .github/ and is NOT auto-discovered there — every gitleaks invocation
# must pass `--config .github/.gitleaks.toml` (the pre-commit hook and VERIFY.md
# step 22 do). Uses the [[allowlists]] array form, honored since gitleaks 8.19
# (the hook pins 8.30.x); the deprecated singular [allowlist] must not reappear —
# 8.30 errors if it coexists with the array form.
#
# Verify after edits (expect 0):
#   gitleaks detect --source . --no-git --config .github/.gitleaks.toml \
#     --report-format json --report-path /tmp/gl.json && jq length /tmp/gl.json

[extend]
useDefault = true

# Recorded LLM trajectories are immutable ground truth (tests/run/replay/RULES.md)
# and carry observability fields — user_api_key_hash / api_key_hash (one-way
# LiteLLM hashes), prompt_cache_key, client-request-id (cache/trace UUIDs) — that
# trip `generic-api-key` but are not credentials. Real secrets are kept OUT of
# fixtures at RECORD time (replay RULES rule 11 / the env-dump scrub from #152),
# which is the control here; gitleaks therefore trusts the recorded-trajectory
# tree wholesale. (If you'd rather gitleaks also enforce per-line, switch this to
# condition="AND" + regexTarget="line" scoped to the field names above.)
[[allowlists]]
description = "Recorded trajectory fixtures hold observability IDs, not credentials"
paths = [
  '''tests/run/replay/fixtures/.*\.trajectory\.jsonl$''',
]

# The detect-secrets baseline (.github/.secrets.baseline) records one-way *hashes*
# of already-reviewed findings plus line metadata — never a live credential — so
# gitleaks must not re-scan it as source. (detect-secrets likewise excludes its
# own baseline; the scanners ignore each other's bookkeeping.)
[[allowlists]]
description = "detect-secrets baseline holds hashed findings, not live secrets"
paths = [
  '''\.github/\.secrets\.baseline$''',
]
