# Gitleaks config for Eval Containers.
#
# Lives in .github/ and is NOT auto-discovered there — every gitleaks invocation
# must pass `--config .github/.gitleaks.toml` (the pre-commit hook and VERIFY.md
# step 22 do). Uses the [[allowlists]] array form, honored since gitleaks 8.19
# (the hook pins 8.30.x); the deprecated singular [allowlist] must not reappear —
# 8.30 errors if it coexists with the array form.
#
# Verify after edits (expect 0):
#   gitleaks detect --source . --no-git --config .github/.gitleaks.toml \
#     --report-format json --report-path /tmp/gl.json && jq length /tmp/gl.json

[extend]
useDefault = true

# ── Custom detections — shapes the default ruleset under-matches ─────
# Recorded trajectories capture the live sweep's environment, so these are the
# credential/endpoint forms that actually showed up there and the defaults miss.
[[rules]]
id = "sk-virtual-key"
description = "sk- API/virtual key, incl. short hyphenated LiteLLM keys the 48-char default openai rule misses"
regex = '''(^|[^A-Za-z0-9])sk-[A-Za-z0-9]{2,}[-_][A-Za-z0-9_-]{10,}'''
keywords = ["sk-"]

[[rules]]
id = "google-oauth-token"
description = "Google OAuth access token (ya29.) — multi-segment, may contain dots"
regex = '''ya29\.[A-Za-z0-9._-]{20,}'''
keywords = ["ya29."]

[[rules]]
id = "ibm-internal-vpc-host"
description = "Internal IBM VPC hostname — infrastructure disclosure, not for public release"
regex = '''[A-Za-z0-9_.-]+\.vpc-int\.res\.ibm\.com'''
keywords = ["vpc-int.res.ibm.com"]

# Recorded LLM trajectories (tests/run/replay/RULES.md rule 4a) are SCANNED for real
# credentials — NOT trusted wholesale. They do carry benign observability fields that
# trip `generic-api-key` but are not secrets: one-way LiteLLM hashes (user_api_key_hash),
# cache/trace IDs (prompt_cache_key), and the base image's PUBLIC GPG_KEY fingerprint.
# Suppress ONLY those, matched per-finding, so a real sk-/ya29./internal-host value on
# any other line in the same tree is still reported. The previous wholesale path-allowlist
# blinded this tree entirely and let a live HF token, a LiteLLM key, and Google OAuth
# tokens through.
[[allowlists]]
description = "Trajectory observability hashes/IDs (one-way hashes + public fingerprint), not credentials"
regexTarget = "match"
regexes = [
  '''user_api_key_hash''',
  '''prompt_cache_key''',
  '''GPG_KEY=[0-9A-F]''',
]

# The detect-secrets baseline (.github/.secrets.baseline) records one-way *hashes*
# of already-reviewed findings plus line metadata — never a live credential — so
# gitleaks must not re-scan it as source. (detect-secrets likewise excludes its
# own baseline; the scanners ignore each other's bookkeeping.)
[[allowlists]]
description = "detect-secrets baseline holds hashed findings, not live secrets"
paths = [
  '''\.github/\.secrets\.baseline$''',
]
