name: fleet-publish-dev (fan-out + pull, branch-only)

# DEV/iteration workflow — branch-only (never runs on main). FAST + ROBUST +
# GUARANTEED no-double-build standalone-fleet publish:
#   - PARALLEL: one matrix job per leaf (fail-fast:false).
#   - BASE-ONCE (GUARANTEED): stage 1 builds the shared deps (core + gateways)
#     exactly once and pushes them. Leaves are built with plain `docker build`,
#     so their `FROM ${REGISTRY}/core|gateways/...:latest` PULLS the pre-built
#     image from the registry — never an in-graph rebuild. (cache-from was only
#     best-effort: a key mismatch silently re-ran pyarrow/apt per leaf.)
#   - SLIM + WARM: leaves use INLINE cache (cache rides inside the image) +
#     cache-from their own :latest, so re-publishes reuse a leaf's layers (incl.
#     its dataset-download RUN) with ZERO separate buildcache/* packages.
# Per-task benchmarks (LABEL eval.benchmark.env="per-task") are EXCLUDED; they're
# published by publish-per-task.yml. Folds into release-images.yml/build-sweep.yml
# at the end, then deleted.
#
# Iterate: set ONLY to a space-separated list of leaf dirs (e.g. "benchmarks/aime
# agents/codex"); empty = all leaves.

on:
  push:
    branches: ['elron/fleet-publish']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic
  TAG: latest
  CACHE: ghcr.io/exgentic/buildcache
  ONLY: ""

jobs:
  bases:
    name: Build shared deps — core + gateways (stage 1)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake + push deps (built once; leaves PULL these)
        env:
          TAG: ${{ env.TAG }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          # core + gateways are the ONLY images FROM'd by other images (verified).
          mapfile -t DEPS < <(find containers/core containers/gateways -name docker-bake.hcl -exec grep -hoE '^target "[^"]+"' {} + \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          echo "Building ${#DEPS[@]} shared deps once: ${DEPS[*]}"
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --set "*.cache-to=type=registry,ref=${CACHE},mode=max" \
            --set "*.cache-from=type=registry,ref=${CACHE}" \
            --provenance=mode=max --sbom=true \
            "${DEPS[@]}" --push

  enumerate:
    name: Enumerate leaf dirs
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.l.outputs.dirs }}
      count: ${{ steps.l.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: |
          if [ -n "$ONLY" ]; then
            read -ra _only <<< "$ONLY"
            dirs=$(printf '%s\n' "${_only[@]}" | jq -R . | jq -sc 'map(select(length>0))')
          else
            # leaf dirs = agents/* + benchmarks/* + models/* with a Dockerfile,
            # minus per-task benchmarks (canonical LABEL). core + gateways are deps
            # (stage 1), not leaves.
            pertask=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
              | sed -E 's#containers/(benchmarks/[^/]+)/Dockerfile#\1#' | sort -u)
            all=$(find containers/agents containers/benchmarks containers/models -mindepth 1 -maxdepth 1 -type d \
              | sed -E 's#containers/##' | sort -u \
              | while read -r d; do [ -f "containers/$d/Dockerfile" ] && echo "$d"; done)
            leaves=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$pertask"))
            dirs=$(printf '%s\n' "$leaves" | jq -R . | jq -sc 'map(select(length>0))')
          fi
          n=$(printf '%s' "$dirs" | jq 'length')
          echo "leaf dirs: $n"
          [ "$n" -gt 0 ] && [ "$n" -le 256 ] || { echo "::error::leaf count $n out of range (1-256)"; exit 1; }
          {
            echo "dirs=$dirs"
            echo "count=$n"
          } >> "$GITHUB_OUTPUT"

  leaves:
    name: ${{ matrix.dir }}
    needs: [bases, enumerate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        dir: ${{ fromJson(needs.enumerate.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push leaf (FROM pulls the pre-built base — no rebuild)
        env:
          DIR: ${{ matrix.dir }}
          TAG: ${{ env.TAG }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          # Plain `docker build`: FROM ${REGISTRY}/core|gateways/...:latest resolves
          # via the ARG defaults and PULLS the stage-1 image — GUARANTEED no in-graph
          # base/gateway rebuild.
          # Cross-run cache WITHOUT bloat: cache-from the leaf's own published image
          # + cache-to=inline (the cache metadata rides inside the image), so a
          # re-publish reuses this leaf's layers (incl. its dataset-download RUN)
          # with ZERO separate buildcache/* packages.
          docker buildx build "containers/${DIR}" \
            --tag "${REGISTRY}/${DIR}:${TAG}" \
            --label "org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --secret "id=HF_TOKEN,env=HF_TOKEN" \
            --cache-from "type=registry,ref=${REGISTRY}/${DIR}:${TAG}" \
            --cache-to "type=inline" \
            --provenance=mode=max --sbom=true \
            --push

  summary:
    name: Summary
    needs: [bases, enumerate, leaves]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "bases  : ${{ needs.bases.result }}"
          echo "leaves : ${{ needs.leaves.result }} (${{ needs.enumerate.outputs.count }} dirs)"
          if [ "${{ needs.leaves.result }}" != success ] || [ "${{ needs.bases.result }}" != success ]; then
            echo "::warning::some leaves failed — fail-fast:false isolated them; see the matrix"
          fi
