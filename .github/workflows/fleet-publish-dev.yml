name: fleet-publish-dev (fan-out + cache, branch-only)

# DEV/iteration workflow — branch-only (never runs on main). The FAST + ROBUST
# standalone-fleet publish:
#   - PARALLEL: one matrix job per leaf target (fail-fast:false), not a monolithic
#     all-or-nothing bake.
#   - BASE-ONCE: stage 1 builds the 12 shared core bases once and writes a shared
#     registry build-cache (mode=max); every leaf cache-from's it, so each leaf's
#     in-graph base build is a CACHE HIT instead of re-running pyarrow/apt 95x.
#   - WARM: registry cache means re-runs reuse layers across runs.
# Per-task benchmarks (LABEL eval.benchmark.env="per-task") are EXCLUDED; they're
# published by publish-per-task.yml. Folds into release-images.yml/build-sweep.yml
# at the end, then deleted.
#
# Iterate: set ONLY to one leaf target to smoke (bases still run); clear for all.

on:
  push:
    branches: ['elron/fleet-publish']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic
  TAG: latest
  CACHE: ghcr.io/exgentic/buildcache
  # smoke knob: one leaf target = build just that leaf (bases still build); empty = all
  ONLY: ""

jobs:
  bases:
    name: Build shared bases (stage 1, populates cache)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake + push core bases (cache-to shared cache)
        env:
          TAG: ${{ env.TAG }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          mapfile -t CORE < <(find containers/core -name docker-bake.hcl -exec grep -hoE '^target "[^"]+"' {} + \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          echo "Building ${#CORE[@]} core bases: ${CORE[*]}"
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.cache-to=type=registry,ref=${CACHE},mode=max" \
            --set "*.cache-from=type=registry,ref=${CACHE}" \
            --provenance=mode=max --sbom=true \
            "${CORE[@]}" --push

  enumerate:
    name: Enumerate leaf targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.l.outputs.targets }}
      count: ${{ steps.l.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: |
          if [ -n "$ONLY" ]; then
            targets=$(jq -nc --arg t "$ONLY" '[$t]')
          else
            # leaf = all bake targets, minus core (built in stage 1), minus per-task
            # benchmarks (canonical label), minus the parameterized combination.
            all=$(find containers -name docker-bake.hcl -not -name 'combination*' -exec grep -hoE '^target "[^"]+"' {} + \
              | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
            core=$(find containers/core -name docker-bake.hcl -exec grep -hoE '^target "[^"]+"' {} + \
              | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
            pertask=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
              | sed -E 's#.*/benchmarks/([^/]+)/Dockerfile#benchmark-\1#' | sort -u)
            leaves=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$core" "$pertask" | sort -u))
            targets=$(printf '%s\n' "$leaves" | jq -R . | jq -sc 'map(select(length>0))')
          fi
          n=$(printf '%s' "$targets" | jq 'length')
          echo "leaf targets: $n"
          [ "$n" -gt 0 ] && [ "$n" -le 256 ] || { echo "::error::leaf count $n out of range (1-256)"; exit 1; }
          {
            echo "targets=$targets"
            echo "count=$n"
          } >> "$GITHUB_OUTPUT"

  leaves:
    name: ${{ matrix.target }}
    needs: [bases, enumerate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        target: ${{ fromJson(needs.enumerate.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake + push target (cache-from shared base cache)
        env:
          TAG: ${{ env.TAG }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          # cache-from the shared base cache → the in-graph base build is a cache
          # hit (no pyarrow/apt re-run). The leaf's own layers build fresh.
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.cache-from=type=registry,ref=${CACHE}" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --provenance=mode=max --sbom=true \
            "${{ matrix.target }}" --push

  summary:
    name: Summary
    needs: [bases, enumerate, leaves]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "bases  : ${{ needs.bases.result }}"
          echo "leaves : ${{ needs.leaves.result }} (${{ needs.enumerate.outputs.count }} targets)"
          if [ "${{ needs.leaves.result }}" != success ] || [ "${{ needs.bases.result }}" != success ]; then
            echo "::warning::some targets failed — fail-fast:false isolated them; see the matrix"
          fi
