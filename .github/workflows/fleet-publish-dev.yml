name: fleet-publish-dev (fan-out, branch-only)

# DEV/iteration workflow — branch-only (never runs on main). Proves the FAST +
# ROBUST standalone-fleet publish: one matrix job per target (fail-fast:false,
# parallel) instead of one monolithic all-or-nothing bake (which kept aborting
# on per-task benchmarks). Per-task benchmarks (LABEL eval.benchmark.env=
# "per-task", the CLI's canonical signal — benchmark.rs::is_per_task) are
# EXCLUDED here; they're published by publish-per-task.yml.
#
# Iterate: set ONLY to one target to smoke it, push; clear ONLY, push for all 139.
# At the end this folds into release-images.yml / build-sweep.yml and is deleted.

on:
  push:
    branches: ['elron/fleet-publish']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic
  TAG: latest
  # smoke knob: one target name = build just that; empty = all standalone targets
  ONLY: "benchmark-aime"

jobs:
  enumerate:
    name: Enumerate standalone targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.l.outputs.targets }}
      count: ${{ steps.l.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: |
          if [ -n "$ONLY" ]; then
            targets=$(jq -nc --arg t "$ONLY" '[$t]')
          else
            # all bake targets minus per-task benchmarks (canonical label) minus the
            # parameterized combination bake.
            all=$(find containers -name docker-bake.hcl -not -name 'combination*' -exec grep -hoE '^target "[^"]+"' {} + \
              | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
            pertask=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
              | sed -E 's#.*/benchmarks/([^/]+)/Dockerfile#benchmark-\1#' | sort -u)
            standalone=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$pertask"))
            targets=$(printf '%s\n' "$standalone" | jq -R . | jq -sc 'map(select(length>0))')
          fi
          n=$(printf '%s' "$targets" | jq 'length')
          echo "standalone targets: $n"
          [ "$n" -gt 0 ] && [ "$n" -le 256 ] || { echo "::error::target count $n out of range (1-256)"; exit 1; }
          {
            echo "targets=$targets"
            echo "count=$n"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }}
    needs: enumerate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        target: ${{ fromJson(needs.enumerate.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake + push target
        env:
          TAG: ${{ env.TAG }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          # Load every bake file so the target's `contexts` (its base chain) resolve
          # and build in-graph; bake pushes only the named target. core base targets
          # are their own matrix entries, so they get pushed too.
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --provenance=mode=max --sbom=true \
            "${{ matrix.target }}" --push

  summary:
    name: Summary
    needs: [enumerate, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "standalone targets: ${{ needs.enumerate.outputs.count }}"
          echo "build result      : ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != success ]; then
            echo "::warning::some targets failed — fail-fast:false isolated them; see the matrix"
          fi
