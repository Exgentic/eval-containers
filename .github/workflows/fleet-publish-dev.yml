name: fleet-publish-dev (frozen-base + grouped-bake, branch-only)

# Branch-only. Combines bake + GitHub parallelism for max speed:
#   - FROZEN BASE: bases (core+gateways) build ONCE, then reused (skip rebuild
#     unless REBUILD_BASES=1). Stable :latest digest → every leaf's FROM is
#     stable → leaf layer caches HIT → no re-download → no HF 429 on re-runs.
#   - GROUPED BAKE: leaves split into N groups; each runner `bake`s its group
#     (BuildKit parallelism + dedup within the group) with the base context
#     overridden to docker-image:// so the frozen base is PULLED, never rebuilt.
#     GitHub runs groups in parallel; MAXPAR throttles concurrent HF load.
#   - per-group registry cache (mode=max) → re-runs reuse layers.
# Per-task benchmarks (LABEL eval.benchmark.env="per-task") excluded.

on:
  push:
    branches: ['elron/fleet-publish']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic
  TAG: latest
  REBUILD_BASES: "0"   # set 1 to rebuild the shared bases (else reuse frozen :latest)
  N_GROUPS: "12"
  ONLY: ""

jobs:
  bases:
    name: Shared deps (frozen unless changed)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build bases only if missing or forced (else freeze)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          if [ "$REBUILD_BASES" != "1" ] && docker buildx imagetools inspect "${REGISTRY}/core/entrypoint:${TAG}" >/dev/null 2>&1; then
            echo "Bases already published — FROZEN (skip rebuild; stable digest → leaf caches hit)."
            exit 0
          fi
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          mapfile -t DEPS < <(find containers/core containers/gateways -name docker-bake.hcl -exec grep -hoE '^target "[^"]+"' {} + \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          echo "Building ${#DEPS[@]} shared deps: ${DEPS[*]}"
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --provenance=mode=max --sbom=true \
            "${DEPS[@]}" --push

  enumerate:
    name: Split leaves into groups
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.l.outputs.groups }}
      count: ${{ steps.l.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: |
          # leaf bake targets = all minus core/gateways (deps) minus per-task benchmarks
          all=$(find containers -name docker-bake.hcl -not -name 'combination*' -exec grep -hoE '^target "[^"]+"' {} + \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          deps=$(find containers/core containers/gateways -name docker-bake.hcl -exec grep -hoE '^target "[^"]+"' {} + \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          pertask=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
            | sed -E 's#.*/benchmarks/([^/]+)/Dockerfile#benchmark-\1#' | sort -u)
          if [ -n "$ONLY" ]; then read -ra _o <<< "$ONLY"; leaves=$(printf '%s\n' "${_o[@]}")
          else leaves=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$deps" "$pertask" | sort -u)); fi
          # round-robin leaves into N_GROUPS buckets; emit JSON array of space-joined target strings
          groups=$(printf '%s\n' "$leaves" | awk -v n="$N_GROUPS" 'NF{a[NR%n]=a[NR%n]" "$0} END{for(i=0;i<n;i++) if(a[i]!="") print substr(a[i],2)}' \
            | jq -R . | jq -sc .)
          echo "groups=$groups" >> "$GITHUB_OUTPUT"
          echo "count=$(printf '%s' "$groups" | jq 'length')" >> "$GITHUB_OUTPUT"
          echo "leaves: $(printf '%s\n' "$leaves" | grep -c .) in $(printf '%s' "$groups" | jq 'length') groups"

  groups:
    name: group ${{ matrix.idx }}
    needs: [bases, enumerate]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        idx: ${{ fromJson(needs.enumerate.outputs.groups) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake this group (pull frozen base, no rebuild)
        env:
          GRP: ${{ matrix.idx }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          # override every base context to PULL the frozen registry image (not in-graph rebuild)
          OV=()
          for d in $(find containers/core containers/gateways -mindepth 1 -maxdepth 1 -type d | sed -E 's#containers/##'); do
            [ -f "containers/$d/Dockerfile" ] || continue
            OV+=(--set "*.contexts.${REGISTRY}/${d}=docker-image://${REGISTRY}/${d}:${TAG}")
          done
          ckey=$(echo "$GRP" | tr ' /' '__')
          read -ra TGTS <<< "$GRP"
          t0=$(date +%s)
          docker buildx bake "${FARGS[@]}" "${OV[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --set "*.cache-to=type=registry,ref=${REGISTRY}/buildcache/grp,mode=max" \
            --set "*.cache-from=type=registry,ref=${REGISTRY}/buildcache/grp" \
            --provenance=mode=max --sbom=true \
            "${TGTS[@]}" --push
          echo "::notice title=group ${ckey}::${#TGTS[@]} targets in $(( $(date +%s) - t0 ))s"
