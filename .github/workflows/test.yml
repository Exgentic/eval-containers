name: Tests

# The static gate: clippy + the daemon-free test suite + static composition
# (every benchmark's deploy artifact loads in all three run modes). Runs on
# every push and PR.
#
# Split of responsibilities with pre-commit.yml: the pre-commit hooks own the
# instant hygiene checks (fmt, hadolint, compose-schema, helm lint, secrets,
# …); this workflow owns everything heavier but still daemon-free — the
# compiler-based Rust gate and the per-mode "does the deploy artifact load"
# sweeps. So fmt is NOT repeated here.
#
# lint-and-test + static-composition are daemon-free (pure Rust/file I/O and
# parse/render-only sweeps). The third job, replay-e2e, is the ONE daemon-backed
# per-PR gate: a miniature of the nightly replay E2E (one fixture) that builds the
# images and stands up the real compose stack — the only check here that catches
# "the stack won't boot" (e.g. otelcol). The remaining container suites (build,
# live, gateways, agents, full replay/fleet) still run elsewhere (nightly-*.yml,
# release-images.yml on tag/main).
#
# Excluded on purpose:
#   - task_inspection::inspect_every_existing_fixture — an audit of recorded
#     sample-trajectory data quality (refusals on safety benchmarks, file
#     delegation on long-context benchmarks are working-as-designed and there
#     is no label to distinguish them). It checks fixtures, not PR soundness,
#     so it is not a per-PR gate. Its rule UNIT tests still run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read # replay-e2e pulls GHCR base images during the build

concurrency:
  # One group per PR/branch so a new push cancels in-flight runs (every job only
  # evaluates the latest commit).
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: clippy + daemon-free tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Lint exactly the daemon-free surface this gate builds: the shipping CLI
      # crate (lib + bins + cli_conformance) and the static-stage gate crate
      # (check / dockerfile_inspection / task_inspection). Scoping by package
      # keeps the testcontainers/tokio/reqwest stack — declared only by the
      # build/run crates, which are linted where they run — off this path.
      - name: cargo clippy -D warnings
        run: |
          cargo clippy \
            -p eval-containers \
            -p eval-containers-tests-static \
            --all-targets \
            -- -D warnings

      # Pure file I/O, no daemon. Dominated by the Rust compile (cached above).
      #   eval-containers              : naming + gen_bake unit tests (lib/bins)
      #                                  + cli_conformance (every benchmark/agent/
      #                                    model matches CLI naming)
      #   eval-containers-tests-static :
      #     - check            : triple-mode file presence, count reconciliation,
      #                          READMEs, + the bespoke repo-meta invariants
      #     - dockerfile_*     : the residual unpinned-pip/npm Dockerfile sweep
      #     - task_inspection  : trajectory rule UNIT tests (fixture audit skipped)
      #
      # The Dockerfile LABEL/pin/hygiene contract and the compose markers +
      # tag-axis rule moved to conftest for issue #114 — run by the
      # conftest-dockerfile / conftest-compose pre-commit hooks (pre-commit.yml).
      # compose schema validation is the check-compose-spec hook. The Rust helm
      # test became tests/static/helm.sweep.sh (run by Static composition below).
      - name: cargo test (daemon-free)
        run: |
          cargo test \
            -p eval-containers \
            -p eval-containers-tests-static \
            -- --skip inspect_every_existing_fixture

  # Static composition: every benchmark's deploy artifact must LOAD in all three
  # run modes. The pre-commit hooks do text/schema hygiene; this hands each
  # artifact to the REAL tool for its mode and fails if it won't load — the class
  # of bug text/schema checks miss (e.g. a compose include/extends merge conflict
  # Podman tolerates but Docker rejects). All daemon-free (parse/render only): no
  # images, no cluster. One job, one check; each mode is a step (sweep logic in
  # tests/static/):
  #   compose          → docker compose config              (compose.config.sweep.sh)
  #   single-container → conftest over process-compose.yaml (standalone.sweep.sh)
  #   k8s              → helm template + kubeconform + conftest (helm.sweep.sh)
  static-composition:
    name: Static composition
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install helm
        uses: azure/setup-helm@v5

      # Pin a strict Compose: the "conflicts with imported resource" rule the
      # compose step catches is version-dependent — newer Compose merges the
      # override silently; v2.32.4 enforces it. conftest pinned to match the
      # pre-commit hooks; kubeconform validates the helm renders.
      - name: Install compose (pinned strict), conftest, kubeconform
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -sSLf -o ~/.docker/cli-plugins/docker-compose \
            https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64
          chmod +x ~/.docker/cli-plugins/docker-compose
          docker compose version
          CONFTEST_VERSION=0.56.0
          curl -sSLf "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest
          curl -sSLf https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      # Each mode is its own step so the failing mode is obvious; `if: always()`
      # on the later steps runs all three even when an earlier one fails, so one
      # CI run surfaces every broken mode rather than just the first.
      - name: compose — docker compose config (every benchmark)
        run: tests/static/compose.config.sweep.sh

      - name: single-container — process-compose wiring
        if: ${{ !cancelled() }}
        run: tests/static/standalone.sweep.sh

      - name: k8s — helm render (every benchmark)
        if: ${{ !cancelled() }}
        run: tests/static/helm.sweep.sh

      - name: model paths — generic gateway + pinned per-model image
        if: ${{ !cancelled() }}
        run: tests/static/model-paths.sweep.sh

  # The one daemon-backed gate: a miniature of the nightly replay E2E. Builds what
  # the full-stack fixture (aime + claude-code) needs and replays it on the real
  # compose stack with the REAL gateway — otelcol → bifrost → runner, the replay
  # server as bifrost's upstream — so a base regression (otelcol OR the gateway
  # failing to boot) shows up at `compose up` on every PR and every push to main.
  replay-e2e:
    name: Replay E2E (full-stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: replay

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Replay full-stack
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Bake only the bases this fixture consumes as image-refs — all FROM
          # SOURCE (never pull :latest; it lags main between releases). The
          # benchmark/agent bakes build their own bases (duckdb, slim) and
          # entrypoint in-graph, and the harness builds the real gateway (bifrost)
          # itself for full-stack; we pre-build the few the eval/compose consume
          # directly: gosu (lean eval), model-replay (gateway upstream), otel
          # (sidecar), agent-base-node (claude-code), plus entrypoint.
          EVAL_BASES_OVERRIDE: entrypoint agent-base-node gosu model-replay otel
        run: |
          # pipefail so a failing `cargo test` isn't masked by the `| tee` exit 0.
          set -eo pipefail
          # Select by substring: `replay_fullstack` uniquely matches the one
          # full-stack smoke test. The grep guards against it matching nothing
          # (libtest exits 0 on zero tests).
          cargo test -p eval-containers-tests-run --test replay \
            -- --ignored --nocapture --test-threads=1 replay_fullstack \
            | tee replay.log
          if grep -qE "running 0 tests" replay.log; then
            echo "::error::ran 0 tests — no 'replay_fullstack' fixture matched"; exit 1
          fi
