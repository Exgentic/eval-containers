name: Pre-commit

# Runs the .pre-commit-config.yaml gates on GitHub so a clone that skipped the
# local hook install (or used --no-verify) can't slip past them. Scoped to the
# files a PR changes, so future drift in untouched files never blocks unrelated
# work. DCO sign-off is enforced by the separate GitHub DCO check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history to diff the PR range

      # The cargo-fmt hook uses the runner's preinstalled Rust stable (rustfmt
      # is part of every ubuntu-latest image) — no toolchain install needed.
      # This step just fails fast if a future image ever drops it.
      - name: Verify rustfmt is available
        run: rustfmt --version

      - name: Install Python (for pre-commit + ruff)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      # Cache hook environments (gitleaks, ruff, shellcheck, check-jsonschema, …)
      # keyed on the config; this is the bulk of the runtime when uncached.
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # hadolint and helm hooks call the system binaries; install them so the
      # runner has what the local dev environment already provides.
      - name: Install hadolint
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      - name: Install helm
        uses: azure/setup-helm@v4

      # Check only the files this PR changes. Compile-based gates (clippy,
      # cargo test) are owned by CI separately (test.yml), not here.
      - name: Run pre-commit
        run: |
          pre-commit run \
            --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD \
            --show-diff-on-failure --color=always
