name: Pre-commit

# Runs the .pre-commit-config.yaml gates on GitHub so a clone that skipped the
# local hook install (or used --no-verify) can't slip past them. Checks every
# file (the whole repo is compliant), so nothing is skipped. DCO sign-off is
# enforced by the separate GitHub DCO check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt   # cargo fmt only; clippy/test gate lives in CI (test.yml)
      - uses: Swatinem/rust-cache@v2

      - name: Install Python (for pre-commit + ruff)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      # hadolint and helm hooks call the system binaries; install them so the
      # runner has what the local dev environment already provides.
      - name: Install hadolint
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      - name: Install helm
        uses: azure/setup-helm@v4

      # The whole repo passes the hooks, so check every file on every run —
      # no per-PR scoping, no skipped files. Compile-based gates (clippy,
      # cargo test) are owned by CI separately (test.yml), not here.
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
