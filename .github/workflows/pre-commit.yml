name: Pre-commit

# Enforces the .pre-commit-config.yaml hooks on PRs, scoped to changed files.
# clippy/test live in test.yml; DCO in the GitHub DCO check.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0   # base history for the PR diff

      # cargo-fmt uses the runner's preinstalled rustfmt; fail fast if it's gone.
      - name: Verify rustfmt is available
        run: rustfmt --version

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - run: pip install pre-commit

      - name: Cache pre-commit environments
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          # pythonLocation is in the key because python-version '3.x' floats the
          # patch — a runner Python bump must rebuild the venvs. restore-keys is
          # the real lever: without it, ANY config edit (a hook add, a Dependabot
          # rev bump) misses the exact key, restores nothing, and pre-commit
          # cold-builds every hook environment (~520s vs ~60s warm). With it, the
          # previous cache is restored and only the changed hook is rebuilt.
          key: pre-commit-${{ runner.os }}-${{ env.pythonLocation }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ env.pythonLocation }}-
            pre-commit-${{ runner.os }}-

      - name: Install hadolint
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      - uses: azure/setup-helm@v5

      # conftest powers the conftest-dockerfile + conftest-compose hooks (the
      # eval LABEL/pin/hygiene + compose markers/tag-axis policy, migrated from
      # the Rust suite for #114).
      - name: Install conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -sSLf "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

      # trivy powers the trivy-config hook (IaC/misconfig + secret-in-build-arg
      # over containers/, net-new for #114).
      - name: Install trivy
        # NOTE: setup-trivy@v0.3.1's `cache: true` breaks the install (its
        # install.sh exits 1 writing to the cache BINARY_DIR), so the binary is
        # downloaded each run (~seconds).
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      # Cache trivy's checks bundle (misconfig policies). trivy pulls it from a
      # registry on first use each run — slow and occasionally rate-limited; this
      # serves it from disk. trivy still self-refreshes the bundle when it ages
      # out, so a static key is safe for config/misconfig checks.
      - name: Cache trivy checks DB
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: trivy-

      # PRs: scope to changed files. main/manual: full check (no PR diff exists).
      - name: Run pre-commit (PR)
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run \
            --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD \
            --show-diff-on-failure --color=always
      - name: Run pre-commit (main / manual)
        if: github.event_name != 'pull_request'
        run: pre-commit run --all-files --show-diff-on-failure --color=always
