name: Pre-commit

# Runs the .pre-commit-config.yaml gates on GitHub so a clone that skipped the
# local hook install (or used --no-verify) can't slip past them. Scoped to the
# files a PR actually changes, so pre-existing issues in untouched files don't
# block unrelated work. DCO sign-off is enforced by the separate GitHub DCO check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history to diff the PR range

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Python (for pre-commit + ruff)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      # On a PR, scope hooks to the changed files via --from-ref/--to-ref so
      # pre-existing issues in untouched files don't block. A hook only runs if
      # the diff contains a file it matches; the whole-project hooks (cargo
      # fmt/clippy/test, pass_filenames: false) run in full once any Rust file
      # changes, and are skipped otherwise. Manual dispatch checks everything.
      - name: Run pre-commit (PR-scoped)
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run --hook-stage pre-push \
            --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD \
            --show-diff-on-failure --color=always

      - name: Run pre-commit (all files)
        if: github.event_name == 'workflow_dispatch'
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure --color=always
