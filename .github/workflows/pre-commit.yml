name: Pre-commit

# Runs the .pre-commit-config.yaml gates on GitHub so a clone that skipped the
# local hook install (or used --no-verify) can't slip past them. Scoped to the
# files a PR actually changes, so pre-existing issues in untouched files don't
# block unrelated work. DCO sign-off is enforced by the separate GitHub DCO check.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history to diff the PR range

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install Python (for pre-commit + ruff)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      # hadolint and helm hooks call the system binaries; install them so the
      # runner has what the local dev environment already provides.
      - name: Install hadolint
        run: |
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      - name: Install helm
        uses: azure/setup-helm@v4

      # On a PR, scope hooks to the changed files via --from-ref/--to-ref so
      # pre-existing issues in untouched files don't block. A hook only runs if
      # the diff contains a file it matches (cargo fmt runs in full once any
      # Rust file changes, since it sets pass_filenames: false). Compile-based
      # gates (clippy, cargo test) are owned by CI separately, not here.
      - name: Run pre-commit (PR-scoped)
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run \
            --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD \
            --show-diff-on-failure --color=always

      - name: Run pre-commit (all files)
        if: github.event_name == 'workflow_dispatch'
        run: pre-commit run --all-files --show-diff-on-failure --color=always
