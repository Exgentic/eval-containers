name: combos-claude-code (branch-only)

# Build the claude-code eval combination for every (shared-env) benchmark and
# oracle-validate each. Demonstrates the build-once pull-through: each combo is
# FROM the PUBLISHED benchmark + COPY the PUBLISHED claude-code agent + a thin
# overlay — no dataset downloads (so no HF 429), just pull-parents + small delta.
#   - build: bake the `eval` target (BENCHMARK_IMAGE + AGENT_IMAGE) -> push
#            evals/<b>--claude-code:latest
#   - oracle: run the benchmark's gold solution through its grader (must score 1.0)
# Per-task benchmarks (LABEL eval.benchmark.env="per-task") are excluded (they
# need --task-id). Branch-only; folds into the publish pipeline later.

on:
  push:
    branches: ['elron/combos']

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic
  AGENT: claude-code

jobs:
  cli:
    name: Build the CLI once
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p eval-containers --quiet
      - uses: actions/upload-artifact@v4
        with:
          name: cli
          path: target/debug/eval-containers

  enumerate:
    name: List shared-env benchmarks
    runs-on: ubuntu-latest
    outputs:
      benchmarks: ${{ steps.l.outputs.benchmarks }}
      count: ${{ steps.l.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: |
          pertask=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
            | sed -E 's#containers/benchmarks/([^/]+)/Dockerfile#\1#' | sort -u)
          all=$(find containers/benchmarks -mindepth 1 -maxdepth 1 -type d | sed -E 's#.*/##' | sort -u \
            | while read -r b; do [ -f "containers/benchmarks/$b/Dockerfile" ] && echo "$b"; done)
          bs=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$pertask") | jq -R . | jq -sc 'map(select(length>0))')
          n=$(printf '%s' "$bs" | jq 'length')
          echo "shared-env benchmarks: $n"
          [ "$n" -gt 0 ] && [ "$n" -le 256 ] || { echo "::error::count $n out of range"; exit 1; }
          { echo "benchmarks=$bs"; echo "count=$n"; } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.b }}
    needs: [cli, enumerate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        b: ${{ fromJson(needs.enumerate.outputs.benchmarks) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with: { name: cli, path: . }
      - run: chmod +x eval-containers
      - name: Bake claude-code combo (pull published benchmark + agent)
        env:
          B: ${{ matrix.b }}
        run: |
          # combo = FROM benchmarks/$B:latest + COPY agents/claude-code:latest + thin overlay
          EVAL_BENCHMARK="$B" EVAL_AGENT="$AGENT" \
          BENCHMARK_IMAGE="${REGISTRY}/benchmarks/${B}:latest" \
          AGENT_IMAGE="${REGISTRY}/agents/${AGENT}:latest" \
          docker buildx bake \
            -f containers/docker-bake.hcl \
            -f containers/core/combination.docker-bake.hcl \
            eval --provenance=mode=max --sbom=true --push
      - name: Oracle — gold solution must score 1.0
        env:
          B: ${{ matrix.b }}
        run: ./eval-containers oracle "$B"

  report:
    name: Summary
    needs: [enumerate, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "claude-code combos over ${{ needs.enumerate.outputs.count }} benchmarks"
          echo "build+oracle result: ${{ needs.build.result }}"
          [ "${{ needs.build.result }}" = success ] || echo "::warning::some combos/oracles failed (fail-fast:false isolated them)"
