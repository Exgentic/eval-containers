name: Release images

# Build the full fleet of benchmark and agent images and push to ghcr.io.
# See RELEASE.md for the design. This is a release tool, not a test tool.
# Test workflows live in test.yml and run cargo tests.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/dock-eval

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Dockerfiles
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          GIT_SHA: ${{ github.sha }}
        run: docker buildx bake -f <(scripts/bake-plan.sh) --check

      - name: Build and push
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          GIT_SHA: ${{ github.sha }}
        run: docker buildx bake -f <(scripts/bake-plan.sh) --push
