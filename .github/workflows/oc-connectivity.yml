name: E2E Test

on:
  # NB: the per-PR trigger is disabled — this E2E `oc login`s to a live OpenShift
  # cluster, so it fails on every PR whenever that cluster/endpoint is unavailable
  # (infra, not the PR). Run it on demand via workflow_dispatch; re-enable the
  # pull_request trigger once the cluster is reliably reachable from CI.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E pipeline test (aime / codex / bifrost)
    # Same-repo only: fork PRs receive empty secrets (oc login fails noisily) and
    # this job runs untrusted PR code (deploy/oc/test.sh). Manual dispatch allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82 # v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: oc login "${{ secrets.OC_SERVER }}" --token="${{ secrets.OC_TOKEN }}" --insecure-skip-tls-verify

      - name: Run e2e test
        run: bash deploy/oc/test.sh --benchmark aime --agent codex --model bifrost --task 0
