name: Publish per-task benchmark images

# Per-task benchmarks (skills-bench, terminal-bench, swe-bench-pro, swe-lancer)
# have no single fleet image — each TASK is its own image, built imperatively by
# containers/benchmarks/<b>/build.sh <ref> <task-id> (a two-step podman build that
# fetches the task from upstream) and pushed as `benchmarks/<b>-<task>`. The fleet
# bake in release-images.yml CANNOT build these (FROM ${TASK_BASE} is blank).
#
# This workflow enumerates a benchmark's tasks and fans them out one job per task
# (fail-fast:false), so a bad task never sinks the rest and N tasks build in
# parallel across runners. Dispatch once per benchmark.
#
# Staged rollout: terminal-bench (91) + skills-bench (87) first; swe-bench-pro
# (731, HF-enumerated) + swe-lancer (prep-script) are run-2 (and >256 tasks must
# be chunked — GitHub's matrix cap).
#
# ATTESTATION GAP: build.sh uses `podman build` (its two-step chaining needs
# podman's local store), so these images do NOT carry the buildx
# --provenance/--sbom attestations release-images.yml puts on the standalone
# fleet. cosign attest/sign is the parity follow-up.

on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: "per-task benchmark (terminal-bench | skills-bench)"
        required: true
      tag:
        description: "image tag"
        default: latest
      only_task:
        description: "build just this one task id (smoke test); empty = all tasks"
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/exgentic

jobs:
  enumerate:
    name: Enumerate tasks
    runs-on: ubuntu-latest
    outputs:
      tasks: ${{ steps.list.outputs.tasks }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        env:
          GH_TOKEN: ${{ github.token }}
          B: ${{ inputs.benchmark }}
          ONLY: ${{ inputs.only_task }}
        run: |
          bs="containers/benchmarks/$B/build.sh"
          [ -f "$bs" ] || { echo "::error::no build.sh for benchmark '$B'"; exit 1; }
          if [ -n "$ONLY" ]; then
            tasks=$(jq -nc --arg t "$ONLY" '[$t]')
          else
            case "$B" in
              terminal-bench|skills-bench)
                # Both fetch tasks from a GitHub `tasks/<task>/` tree at a pinned
                # 40-hex ref — parse repo + ref straight out of build.sh.
                repo=$(grep -oE 'github\.com/[A-Za-z0-9_./-]+' "$bs" | head -1 | sed -E 's#github\.com/##; s#\.git$##')
                ref=$(grep -oE '[0-9a-f]{40}' "$bs" | head -1)
                echo "upstream: $repo @ $ref"
                tasks=$(gh api "repos/$repo/contents/tasks?ref=$ref" --paginate \
                  --jq '[.[] | select(.type=="dir") | .name]')
                ;;
              *)
                echo "::error::task enumeration for '$B' not implemented yet (run-2: swe-bench-pro via HF, swe-lancer via prep script)"; exit 1;;
            esac
          fi
          n=$(printf '%s' "$tasks" | jq 'length')
          echo "Enumerated $n task(s) for $B"
          [ "$n" -gt 0 ] || { echo "::error::no tasks found for '$B'"; exit 1; }
          [ "$n" -le 256 ] || { echo "::error::$n tasks exceeds GitHub's 256-job matrix cap — chunk this benchmark (run-2)"; exit 1; }
          {
            echo "tasks=$(printf '%s' "$tasks" | jq -c .)"
            echo "count=$n"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ inputs.benchmark }} / ${{ matrix.task }}
    needs: enumerate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        task: ${{ fromJson(needs.enumerate.outputs.tasks) }}
    steps:
      - uses: actions/checkout@v6
      - name: Ensure podman
        run: command -v podman >/dev/null || { sudo apt-get update && sudo apt-get install -y podman; }
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build + push task
        env:
          B: ${{ inputs.benchmark }}
          TASK: ${{ matrix.task }}
          TAG: ${{ inputs.tag }}
        run: |
          # Docker tags must be lowercase; the upstream task dir name (TASK) is
          # case-sensitive, so lowercase only the image ref (matches the CLI's
          # naming::benchmark_task_image).
          tid=$(printf '%s' "$TASK" | tr '[:upper:]' '[:lower:]')
          ref="${REGISTRY}/benchmarks/${B}-${tid}:${TAG}"
          echo "::group::build $TASK -> $ref"
          bash "containers/benchmarks/$B/build.sh" "$ref" "$TASK"
          echo "::endgroup::"
          podman push "$ref"

  summary:
    name: Summary
    needs: [enumerate, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "benchmark : ${{ inputs.benchmark }}"
          echo "tasks     : ${{ needs.enumerate.outputs.count }}"
          echo "build     : ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" != success ]; then
            echo "::warning::some per-task builds failed — fail-fast:false isolated them; see the matrix"
          fi
