name: Release the fleet

# ONE workflow to release the ENTIRE fleet to GHCR, as fast as GitHub Actions
# allows. Consolidates what used to be four workflows (release-images +
# fleet-publish-dev + combos-claude-code + publish-per-task) into a single
# pipeline that uses every GitHub-Actions-NATIVE textbook speedup:
#
#   * FROZEN BASE       — shared deps (core + gateways) build ONCE; leaves pull
#                         the frozen :latest by overriding the bake context to
#                         docker-image:// (stable digest -> leaf caches hit).
#   * PER-LEAF MATRIX   — one job per leaf (not 10-leaf groups), so the wall
#                         clock is the slowest SINGLE benchmark, not the slowest
#                         group, and one leaf's failure can't sink its neighbours
#                         (fail-fast:false). Re-running retries only the failed
#                         leaf. (max-parallel + runner size are repo Variables —
#                         FLEET_MAXPAR / FLEET_RUNNER — tune without editing this.)
#   * PER-LEAF CACHE    — each leaf has its own registry layer cache (mode=max),
#                         so editing one Dockerfile rebuilds only that leaf.
#   * PROVENANCE + SBOM — SLSA provenance + syft SBOM on every pushed image.
#   * CVE GATE          — trivy scans the shared bases before :latest is promoted.
#   * MULTI-ARCH        — native-per-arch: bases/leaves/per-task build on amd64
#                         AND arm64 runners (NOT QEMU — pyarrow segfaults under it),
#                         each pushing :TAG-<arch>; the `merge` job then stitches the
#                         :TAG manifest list. Combos build multi-arch directly
#                         (buildx --platform — thin overlays are QEMU-safe). The
#                         arm64 runner label is the FLEET_RUNNER_ARM repo Variable
#                         (default ubuntu-24.04-arm).
#
# The registry LAYER cache above is what gives cross-run reuse on ephemeral
# runners: a benchmark's dataset layer is reused until its Dockerfile changes.
# The two remaining textbook levers — a persistent WARM builder and `--mount=
# type=cache` deps that survive across runs — only pay off on a builder whose
# cache outlives the runner (Depot or self-hosted BuildKit), which is NOT
# GitHub-Actions-native, so both are deliberately out of scope here.
#
# Triggered by a vX.Y.Z tag (full versioned release) or workflow_dispatch (knobs
# below). Only validated by a real run — the fleet build does not run locally.

on:
  push:
    tags: ['**[0-9]+.[0-9]+.[0-9]+*']  # one tag fires this + release.yml (delivery/RULES.md:1)
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to publish (e.g. v0.1.0); blank = build at :latest"
        default: ""
      rebuild_bases:
        description: "Rebuild shared bases (else reuse the frozen :latest digest)"
        type: boolean
        default: false
      combo_agents:
        description: "Space-separated agents to build eval combos for (blank = skip)"
        # The 5 most-downloaded agents — the lineup a vX.Y.Z tag publishes. NOTE:
        # workflow_dispatch inputs are NOT populated on a tag push, so the enumerate
        # body re-applies this lineup for non-dispatch runs (keep the two in sync).
        default: "claude-code codex gemini-cli openclaw zerostack"
      include_per_task:
        description: "Also build per-task benchmark images (terminal-bench, skills-bench)"
        type: boolean
        default: true
      include_standalone:
        description: "Also build single-container -standalone bundles for each combo"
        type: boolean
        default: true
      dry_run:
        description: "Validate only — bake --print / echo, nothing built or pushed"
        type: boolean
        default: false
      only:
        description: "Debug: restrict matrices to these space-separated leaf targets (e.g. 'benchmark-gsm8k agent-claude-code'); blank = whole fleet"
        default: ""
      skip_published:
        description: "Incremental: skip building any image already at :TAG (build only missing/failed). Use when re-running and the published images are still current."
        type: boolean
        default: false

concurrency:
  group: fleet-release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a release mid-flight

permissions:
  contents: read
  packages: write  # push to GHCR; Actions-pushed packages auto-link to this repo

env:
  REGISTRY: ghcr.io/exgentic
  # The git tag, the dispatch input, or 'latest'.
  TAG: ${{ (github.ref_type == 'tag' && github.ref_name) || inputs.tag || 'latest' }}

jobs:
  # ── version guard (tag / explicit-version releases only) ──────────────────
  guard:
    if: github.ref_type == 'tag' || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: git tag matches Cargo.toml + Chart.yaml (RULES.md principle 9)
        run: |
          ver="${TAG#v}"
          cargo_ver=$(grep -m1 '^version = ' cli/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          chart_ver=$(grep -m1 '^version: ' containers/benchmarks/_chart/Chart.yaml | awk '{print $2}')
          echo "tag=$ver cargo=$cargo_ver chart=$chart_ver"
          if [ "$ver" != "$cargo_ver" ] || [ "$ver" != "$chart_ver" ]; then
            echo "::error::version mismatch — bump cli/Cargo.toml + _chart/Chart.yaml to $ver before tagging"
            exit 1
          fi

  # ── build the CLI once (used by compose + version-stamped builds) ─────────
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p eval-containers --release --quiet
      - uses: actions/upload-artifact@v4
        with:
          name: cli
          path: target/release/eval-containers

  # ── frozen base: shared deps (core + gateways) build ONCE, per-arch ───────
  # Native-per-arch: amd64 on a standard runner, arm64 on ubuntu-24.04-arm
  # (set vars.FLEET_RUNNER_ARM to override). Each arch pushes :TAG-<arch>; the
  # `merge` job stitches them into the :TAG manifest list. No QEMU — the heavy
  # builds (pyarrow) only build natively (QEMU segfaults), so every arch builds
  # on its own metal. Leaves then pull the per-arch base they were built against.
  bases:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ${{ vars.FLEET_RUNNER || 'ubuntu-latest' }}
          - arch: arm64
            runner: ${{ vars.FLEET_RUNNER_ARM || 'ubuntu-24.04-arm' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build bases (${{ matrix.arch }}) only if missing or forced (else freeze)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
          ARCH: ${{ matrix.arch }}
        run: |
          export TAG="${TAG}-${ARCH}"   # per-arch tag; merge builds the :TAG manifest list
          if [ "${{ inputs.rebuild_bases }}" != "true" ] && \
             docker buildx imagetools inspect "${REGISTRY}/core/entrypoint:${TAG}" >/dev/null 2>&1; then
            echo "Bases present at :${TAG} — FROZEN (skip; stable digest → leaf caches hit)."
            exit 0
          fi
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          mapfile -t DEPS < <(find containers/core containers/gateways -name docker-bake.hcl \
            -exec grep -hoE '^target "[^"]+"' {} + | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          echo "Building ${#DEPS[@]} shared deps (${ARCH}): ${DEPS[*]}"
          ACT=(--provenance=mode=max --sbom=true "${DEPS[@]}" --push)
          [ "${{ inputs.dry_run }}" = "true" ] && ACT=("${DEPS[@]}" --print)
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --set "*.cache-to=type=registry,ref=${REGISTRY}/buildcache/bases-${ARCH},mode=max" \
            --set "*.cache-from=type=registry,ref=${REGISTRY}/buildcache/bases-${ARCH}" \
            "${ACT[@]}"

  # ── enumerate everything the matrices fan out over ────────────────────────
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      leaves: ${{ steps.l.outputs.leaves }}        # bake targets: benchmarks(shared)+agents+models
      benchmarks: ${{ steps.l.outputs.benchmarks }} # benchmark names with a compose.yaml
      combo_shards: ${{ steps.l.outputs.combo_shards }}   # [{idx,items:[{b,a,task,kind}]}] sharded ≤256
      pertask_shards: ${{ steps.l.outputs.pertask_shards }} # [{idx,items:[{b,task,kind}]}] sharded ≤256
    steps:
      - uses: actions/checkout@v6
      - id: l
        env:
          GH_TOKEN: ${{ github.token }}
          COMBO_AGENTS: ${{ inputs.combo_agents }}
          INCLUDE_PER_TASK: ${{ inputs.include_per_task }}
          ONLY: ${{ inputs.only }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # A tag push does NOT populate workflow_dispatch inputs, so COMBO_AGENTS /
          # INCLUDE_PER_TASK arrive empty and combos + per-task would be skipped. On
          # any non-dispatch trigger (the vX.Y.Z release tag) force the full published
          # lineup; a manual dispatch keeps its inputs (blank combo_agents = skip).
          if [ "$IS_DISPATCH" != "true" ]; then
            COMBO_AGENTS="claude-code codex gemini-cli openclaw zerostack"
            INCLUDE_PER_TASK=true
          fi
          all=$(find containers -name docker-bake.hcl -not -name 'combination*' \
            -exec grep -hoE '^target "[^"]+"' {} + | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          deps=$(find containers/core containers/gateways -name docker-bake.hcl \
            -exec grep -hoE '^target "[^"]+"' {} + | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          pertaskdirs=$(grep -rl 'eval.benchmark.env="per-task"' containers/benchmarks/*/Dockerfile \
            | sed -E 's#.*/benchmarks/([^/]+)/Dockerfile#benchmark-\1#' | sort -u)
          # Leaves = everything minus shared deps minus per-task (those build below).
          leaf_list=$(comm -23 <(printf '%s\n' "$all") <(printf '%s\n' "$deps" "$pertaskdirs" | sort -u))
          # Debug: --only restricts every matrix to a handful of named leaf targets.
          if [ -n "${ONLY:-}" ]; then
            leaf_list=$(comm -12 <(printf '%s\n' "$leaf_list" | sort -u) <(tr ' ' '\n' <<< "$ONLY" | sort -u))
            echo "ONLY active -> $(printf '%s\n' "$leaf_list" | grep -c .) leaf target(s)"
          fi
          leaves=$(printf '%s\n' "$leaf_list" | jq -Rsc 'split("\n")|map(select(length>0))')
          n=$(printf '%s' "$leaves" | jq 'length')
          if [ "$n" -le 0 ] || [ "$n" -gt 128 ]; then echo "::error::leaf count $n outside 1..128 (build fans out × 2 arches → must fit GitHub's 256-job matrix cap)"; exit 1; fi

          # Shared-env benchmark names (have a compose.yaml) — for compose + combos.
          # --only mode derives them from the restricted leaves; else all shared benchmarks.
          if [ -n "${ONLY:-}" ]; then
            bench_src=$(printf '%s\n' "$leaf_list" | sed -n 's/^benchmark-//p')
          else
            bench_src=$(comm -23 \
              <(find containers/benchmarks -mindepth 1 -maxdepth 1 -type d | sed -E 's#.*/##' | sort -u) \
              <(printf '%s\n' "$pertaskdirs" | sed 's/^benchmark-//' | sort -u))
          fi
          benchmarks=$(printf '%s\n' "$bench_src" \
            | while read -r b; do [ -n "$b" ] && [ -f "containers/benchmarks/$b/compose.yaml" ] && echo "$b"; done \
            | jq -Rsc 'split("\n")|map(select(length>0))')

          # ── per-task bases: {b,task,kind} for every per-task benchmark ──
          # kind=script -> build.sh (podman two-step upstream build; tasks from the
          # pinned GitHub tree). kind=bake -> docker buildx bake (swe-bench: FROM
          # the Epoch per-task base + EVAL_TASK_ID; tasks from the in-repo tasks.txt).
          pertask='[]'
          if [ "$INCLUDE_PER_TASK" = "true" ]; then
            acc='[]'
            for B in terminal-bench skills-bench; do
              bs="containers/benchmarks/$B/build.sh"; [ -f "$bs" ] || continue
              repo=$(grep -oE 'github\.com/[A-Za-z0-9_./-]+' "$bs" | head -1 | sed -E 's#github\.com/##; s#\.git$##')
              ref=$(grep -oE '[0-9a-f]{40}' "$bs" | head -1)
              tks=$(gh api "repos/$repo/contents/tasks?ref=$ref" --paginate \
                --jq "[.[] | select(.type==\"dir\") | {b:\"$B\", task:.name, kind:\"script\"}]" 2>/dev/null || echo '[]')
              acc=$(printf '%s\n%s' "$acc" "$tks" | jq -cs 'add')   # stdin: arrays too big for argv
            done
            for B in swe-bench; do
              tf="containers/benchmarks/$B/tasks.txt"; [ -f "$tf" ] || continue
              tks=$(jq -Rn --arg B "$B" '[inputs | select(length>0) | {b:$B, task:., kind:"bake"}]' < "$tf")
              acc=$(printf '%s\n%s' "$acc" "$tks" | jq -cs 'add')   # stdin: arrays too big for argv
            done
            pertask="$acc"
            # --only mode: one task per benchmark as a smoke, not all ~600.
            [ -n "${ONLY:-}" ] && pertask=$(printf '%s' "$pertask" | jq -c 'group_by(.b) | map(.[0])')
          fi

          # ── combos: shared (task="") + per-task, all as {b,a,task,kind} ──
          # Both build via one downstream bake-eval call (per-task just points at the
          # per-task base + a task-suffixed name), so they share one shape + matrix.
          combos='[]'
          if [ -n "$COMBO_AGENTS" ]; then
            read -ra _ag <<< "$COMBO_AGENTS"
            agents=$(printf '%s\n' "${_ag[@]}" | jq -Rsc 'split("\n")|map(select(length>0))')
            # Large arrays go through stdin, never argv: a per-task combo list is
            # >128KB, which exceeds Linux's MAX_ARG_STRLEN (--argjson would E2BIG).
            # Only the small agents list rides argv.
            shared=$(printf '%s' "$benchmarks" | jq -c --argjson as "$agents" \
              '[.[] as $b | $as[] as $a | {b:$b, a:$a, task:"", kind:"shared"}]')
            ptc=$(printf '%s' "$pertask" | jq -c --argjson as "$agents" \
              '[.[] as $p | $as[] as $a | {b:$p.b, a:$a, task:$p.task, kind:$p.kind}]')
            combos=$(printf '%s\n%s' "$shared" "$ptc" | jq -cs 'add')
          fi

          # ── shard oversize lists into ≤256 chunks: [{idx,items}] ──
          # GitHub caps a matrix at 256 jobs; each shard job loops its items. Chunk
          # combos by 25 (thin overlays) and per-task bases by 10 (heavier builds).
          shard() { jq -c --argjson k "$2" '[range(0;length;$k) as $i | {idx:($i/$k|floor), items:.[$i:$i+$k]}]' <<< "$1"; }
          combo_shards=$(shard "$combos" 25)
          pertask_shards=$(shard "$pertask" 10)
          # combos build per shard via buildx --platform (one job/shard) → ≤256;
          # per-task fans out per shard × 2 arches → its matrix must fit 256.
          cn=$(printf '%s' "$combo_shards" | jq length); ptn=$(printf '%s' "$pertask_shards" | jq length)
          [ "$cn" -le 256 ] || { echo "::error::combo_shards = $cn > 256 — raise the combo chunk size in enumerate"; exit 1; }
          [ "$((ptn * 2))" -le 256 ] || { echo "::error::pertask_shards = $ptn × 2 arch = $((ptn * 2)) > 256 — raise the per-task chunk size in enumerate"; exit 1; }

          {
            echo "leaves=$leaves"
            echo "benchmarks=$benchmarks"
            echo "combo_shards=$combo_shards"
            echo "pertask_shards=$pertask_shards"
          } >> "$GITHUB_OUTPUT"
          echo "leaves=$n  combos=$(printf '%s' "$combos" | jq length) in $(printf '%s' "$combo_shards" | jq length) shards  pertask=$(printf '%s' "$pertask" | jq length) in $(printf '%s' "$pertask_shards" | jq length) shards"

  # ── build every leaf — one job per leaf (max parallelism + isolation) ─────
  build:
    name: leaf ${{ matrix.target }} (${{ matrix.arch }})
    needs: [bases, enumerate]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(vars.FLEET_MAXPAR || '20') }}
      matrix:
        target: ${{ fromJson(needs.enumerate.outputs.leaves) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ${{ vars.FLEET_RUNNER || 'ubuntu-latest' }}
          - arch: arm64
            runner: ${{ vars.FLEET_RUNNER_ARM || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake ${{ matrix.target }} (${{ matrix.arch }}; frozen base, per-leaf cache)
        timeout-minutes: 25  # cap a stalled leaf — a hung download blocked the matrix ~40m; leaves build in <2m
        env:
          T: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          export TAG="${TAG}-${ARCH}"   # per-arch tag; merge builds the :TAG manifest list
          # Incremental (skip_published): if this leaf is already at :TAG-arch, skip it.
          if [ "${{ inputs.skip_published }}" = "true" ] && \
             docker buildx imagetools inspect "${REGISTRY}/${T%%-*}s/${T#*-}:${TAG}" >/dev/null 2>&1; then
            echo "skip-published: $T already at :$TAG"; exit 0
          fi
          mapfile -t FILES < <(find containers -name docker-bake.hcl -not -name 'combination*')
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          # Override every base context to PULL the frozen registry image, so this
          # leaf builds only its own layers FROM the frozen base (never rebuilds it).
          OV=()
          for d in $(find containers/core containers/gateways -mindepth 1 -maxdepth 1 -type d | sed -E 's#containers/##'); do
            [ -f "containers/$d/Dockerfile" ] || continue
            OV+=(--set "*.contexts.${REGISTRY}/${d}=docker-image://${REGISTRY}/${d}:${TAG}")
          done
          # Retry transient build failures — chiefly HF rate-limiting (429) when a
          # duckdb leaf materializes its dataset. BuildKit's cache resumes at the
          # failed layer, and the jittered backoff de-syncs parallel leaves so they
          # stop hammering HF in lockstep. Real failures still surface after max.
          retry() {
            local n=0 max="${BUILD_RETRIES:-4}"
            until "$@"; do
              n=$((n+1)); [ "$n" -ge "$max" ] && { echo "::error::failed after $max attempts"; return 1; }
              echo "::warning::build attempt $n/$max failed; backing off"; sleep $(( n*30 + (RANDOM % 30) ))
            done
          }
          # dry_run validates config only (bake --print); else build + attest + push.
          ACT=(--provenance=mode=max --sbom=true "$T" --push)
          [ "${{ inputs.dry_run }}" = "true" ] && ACT=("$T" --print)
          retry docker buildx bake "${FARGS[@]}" "${OV[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --set "*.cache-to=type=registry,ref=${REGISTRY}/buildcache/${T}-${ARCH},mode=max" \
            --set "*.cache-from=type=registry,ref=${REGISTRY}/buildcache/${T}-${ARCH}" \
            "${ACT[@]}"

  # ── per-task base images — sharded; each job builds a chunk of (b,task) ───
  # Two mechanics in one job: kind=script (build.sh via podman, chained through
  # the local store) and kind=bake (swe-bench via buildx FROM the Epoch base).
  # >256 (b,task) pairs are sharded; one item failing only fails its own ref.
  per-task:
    needs: [bases, enumerate]
    if: needs.enumerate.outputs.pertask_shards != '[]'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(vars.FLEET_MAXPAR || '20') }}
      matrix:
        shard: ${{ fromJson(needs.enumerate.outputs.pertask_shards) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ${{ vars.FLEET_RUNNER || 'ubuntu-latest' }}
          - arch: arm64
            runner: ${{ vars.FLEET_RUNNER_ARM || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4   # kind=bake (swe-bench)
      - name: Ensure podman                    # kind=script (build.sh)
        run: command -v podman >/dev/null || { sudo apt-get update && sudo apt-get install -y podman; }
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR (podman)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build + push per-task shard ${{ matrix.shard.idx }} (${{ matrix.arch }})
        env:
          ITEMS: ${{ toJson(matrix.shard.items) }}
          DRY: ${{ inputs.dry_run }}
          ARCH: ${{ matrix.arch }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # pragma: allowlist secret
        run: |
          export TAG="${TAG}-${ARCH}"   # per-arch tag; merge builds the :TAG manifest list
          # Epoch's swe-bench bases are named x86_64 / arm64 (kind=bake FROMs this).
          EPOCH_ARCH=x86_64; [ "$ARCH" = "arm64" ] && EPOCH_ARCH=arm64
          # Tags must be lowercase; upstream task dir names are case-sensitive
          # (matches the CLI's naming::benchmark_task_image).
          # retry rides out transient HF rate-limiting (swe-bench fetches task
          # metadata from HF) + registry blips; jittered backoff de-syncs the shard.
          retry() {
            local n=0 max="${BUILD_RETRIES:-4}"
            until "$@"; do
              n=$((n+1)); [ "$n" -ge "$max" ] && return 1
              echo "::warning::attempt $n/$max failed; backing off"; sleep $(( n*30 + (RANDOM % 30) ))
            done
          }
          fails=0
          while read -r it; do
            IFS=$'\t' read -r B TASK KIND < <(jq -r '[.b,.task,.kind]|@tsv' <<< "$it")
            tid=$(printf '%s' "$TASK" | tr '[:upper:]' '[:lower:]')
            ref="${REGISTRY}/benchmarks/${B}-${tid}:${TAG}"
            cache="${REGISTRY}/buildcache/${B}-${tid}-${ARCH}"
            if [ "${{ inputs.skip_published }}" = "true" ] && docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then echo "skip-published: $ref"; continue; fi
            if [ "$DRY" = "true" ]; then echo "dry-run: $ref ($KIND)"; continue; fi
            echo "::group::$ref ($KIND)"
            if [ "$KIND" = "script" ]; then
              # build.sh turns on podman --cache-to/from when EVAL_BUILD_CACHE is set.
              # It builds native (per-arch); push only if the built arch matches this
              # runner — a task whose upstream pins a different arch is skipped so the
              # merge keeps it single-arch (never a mislabeled :TAG-<arch>).
              if EVAL_BUILD_CACHE="$cache" retry bash "containers/benchmarks/$B/build.sh" "$ref" "$TASK"; then
                built=$(podman image inspect "$ref" --format '{{.Architecture}}' 2>/dev/null || echo unknown)
                if [ "$built" = "$ARCH" ]; then
                  retry podman push "$ref" || { echo "::error::push failed: $ref"; fails=$((fails+1)); }
                else
                  echo "::warning::$ref built $built != $ARCH (upstream arch-pinned) — skipping push; merge keeps it single-arch"
                fi
              else echo "::error::per-task build failed: $ref"; fails=$((fails+1)); fi
            else
              # bake: FROM the Epoch per-task base + EVAL_TASK_ID; pull the frozen entrypoint.
              if retry docker buildx bake -f containers/docker-bake.hcl -f "containers/benchmarks/$B/docker-bake.hcl" \
                   --set "benchmark-${B}.args.EVAL_TASK_ID=${TASK}" \
                   --set "benchmark-${B}.args.EVAL_BASE_ARCH=${EPOCH_ARCH}" \
                   --set "benchmark-${B}.contexts.${REGISTRY}/core/entrypoint=docker-image://${REGISTRY}/core/entrypoint:${TAG}" \
                   --set "benchmark-${B}.tags=${ref}" \
                   --set "benchmark-${B}.cache-to=type=registry,ref=${cache},mode=max" \
                   --set "benchmark-${B}.cache-from=type=registry,ref=${cache}" \
                   --provenance=mode=max --sbom=true "benchmark-${B}" --push; then :; \
              else echo "::error::per-task bake failed: $ref"; fails=$((fails+1)); fi
            fi
            echo "::endgroup::"
          done < <(jq -c '.[]' <<< "$ITEMS")
          [ "$fails" -eq 0 ] || { echo "::error::$fails per-task item(s) failed in shard ${{ matrix.shard.idx }}"; exit 1; }

  # ── merge per-arch tags into :TAG manifest lists ──────────────────────────
  # Every base / leaf / per-task image was pushed as :TAG-amd64 AND :TAG-arm64 by
  # its per-arch build job; stitch each into a multi-arch :TAG manifest list with
  # `imagetools create`. An image with no per-arch tag (a leaf that failed both
  # arches, or a per-task with no arm64 upstream) is skipped — that isolates the
  # failure (the image stays absent / single-arch) instead of sinking the merge.
  # Runs on a PARTIAL build (success OR failure); requires bases (everything FROMs
  # them). Combos + compose then consume the :TAG manifest lists.
  merge:
    needs: [bases, build, per-task, enumerate]
    if: always() && !inputs.dry_run && needs.bases.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LEAVES: ${{ needs.enumerate.outputs.leaves }}
      PERTASK_SHARDS: ${{ needs.enumerate.outputs.pertask_shards }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: imagetools create :TAG from :TAG-amd64 + :TAG-arm64
        run: |
          retry() { local n=0 max="${BUILD_RETRIES:-4}"; until "$@"; do n=$((n+1)); [ "$n" -ge "$max" ] && return 1; sleep $(( n*10 + (RANDOM % 10) )); done; }
          # Collect every image ref the per-arch jobs pushed: bases (core+gateways
          # dirs), leaves (target→path), per-task (benchmarks/<b>-<tid>).
          : > /tmp/refs.txt
          for kind in core gateways; do
            for d in containers/"$kind"/*/; do
              name=$(basename "$d"); case $name in _*) continue ;; esac
              [ -f "${d}docker-bake.hcl" ] || continue
              echo "${REGISTRY}/${kind}/${name}" >> /tmp/refs.txt
            done
          done
          jq -r '.[]?' <<< "${LEAVES:-[]}" | while read -r T; do
            kind=${T%%-*}; nm=${T#*-}
            case "$kind" in benchmark) dir=benchmarks ;; agent) dir=agents ;; model) dir=models ;; gateway) dir=gateways ;; *) dir=$kind ;; esac
            echo "${REGISTRY}/${dir}/${nm}" >> /tmp/refs.txt
          done
          jq -r '.[]?|.items[]?|"\(.b)\t\(.task)"' <<< "${PERTASK_SHARDS:-[]}" | while IFS=$'\t' read -r B TASK; do
            tid=$(printf '%s' "$TASK" | tr '[:upper:]' '[:lower:]')
            echo "${REGISTRY}/benchmarks/${B}-${tid}" >> /tmp/refs.txt
          done
          sort -u /tmp/refs.txt -o /tmp/refs.txt
          echo "Merging $(wc -l < /tmp/refs.txt) image refs into :${TAG} manifest lists"
          fails=0; merged=0; skipped=0
          while read -r ref; do
            [ -n "$ref" ] || continue
            srcs=()
            for a in amd64 arm64; do
              docker buildx imagetools inspect "${ref}:${TAG}-${a}" >/dev/null 2>&1 && srcs+=("${ref}:${TAG}-${a}")
            done
            if [ "${#srcs[@]}" -eq 0 ]; then skipped=$((skipped+1)); continue; fi
            if retry docker buildx imagetools create --tag "${ref}:${TAG}" "${srcs[@]}"; then merged=$((merged+1)); \
            else echo "::error::merge failed: ${ref}:${TAG}"; fails=$((fails+1)); fi
          done < /tmp/refs.txt
          echo "merged=$merged skipped=$skipped fails=$fails"
          [ "$fails" -eq 0 ] || { echo "::error::$fails manifest merge(s) failed"; exit 1; }

  # ── compose artifacts — one self-contained oci://…/eval-<b> per benchmark ──
  # Per-benchmark matrix (each benchmark isolated). needs `merge` so each bundle
  # references the multi-arch :TAG manifest lists; one missing leaf can't skip
  # every benchmark's bundle.
  compose:
    needs: [cli, merge, enumerate]
    if: always() && (needs.merge.result == 'success' || inputs.dry_run) && needs.cli.result == 'success' && needs.enumerate.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(vars.FLEET_MAXPAR || '20') }}
      matrix:
        benchmark: ${{ fromJson(needs.enumerate.outputs.benchmarks) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with: { name: cli, path: . }
      - run: chmod +x eval-containers
      - name: build compose -> push eval-${{ matrix.benchmark }}
        env:
          EVAL_REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ env.TAG }}
          B: ${{ matrix.benchmark }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry-run: would publish oci://${EVAL_REGISTRY}/eval-${B}"; exit 0
          fi
          ./eval-containers build compose --benchmark "$B"

  # ── eval combos — sharded; each job bakes a chunk of (benchmark, agent) ───
  # One bake-eval per item: shared (evals/<b>--<a>) or per-task (evals/<b>-<task>
  # --<a>, pointing at the per-task base). A combo is a thin overlay (FROM the
  # published benchmark + COPY the agent), so there are no dataset downloads and
  # no per-combo registry cache (the published parents are the cache). Combos build
  # multi-arch directly with buildx --platform (thin overlays → QEMU-safe, no native
  # split needed): FROM the merged :TAG manifest-list parents, so each platform
  # selects its own arch. needs `merge` so those manifest lists exist; a combo whose
  # parent is missing or single-arch just fails that one item (counted below) — the
  # rest publish, preserving per-leaf isolation through the merge.
  combos:
    needs: [merge, enumerate]
    if: always() && (needs.merge.result == 'success' || inputs.dry_run) && needs.enumerate.outputs.combo_shards != '[]'
    runs-on: ${{ vars.FLEET_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(vars.FLEET_MAXPAR || '20') }}
      matrix:
        shard: ${{ fromJson(needs.enumerate.outputs.combo_shards) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3   # combos build arm64 via --platform (QEMU) on this amd64 runner
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake eval combo shard ${{ matrix.shard.idx }}
        env:
          ITEMS: ${{ toJson(matrix.shard.items) }}
          DRY: ${{ inputs.dry_run }}
          STANDALONE: ${{ inputs.include_standalone }}
        run: |
          # retry rides out transient registry pull/push blips; jittered backoff.
          retry() {
            local n=0 max="${BUILD_RETRIES:-4}"
            until "$@"; do
              n=$((n+1)); [ "$n" -ge "$max" ] && return 1
              echo "::warning::attempt $n/$max failed; backing off"; sleep $(( n*30 + (RANDOM % 30) ))
            done
          }
          fails=0
          while read -r it; do
            IFS=$'\t' read -r B A TASK < <(jq -r '[.b,.a,.task]|@tsv' <<< "$it")
            if [ -n "$TASK" ]; then           # per-task combo: evals/<b>-<task>--<a>
              tid=$(printf '%s' "$TASK" | tr '[:upper:]' '[:lower:]')
              eb="${B}-${tid}"; bench_img="${REGISTRY}/benchmarks/${B}-${tid}:${TAG}"
              PLAT="linux/amd64"              # heavy per-task base × arm64-via-QEMU hangs → amd64-only
            else                              # shared combo: evals/<b>--<a>
              eb="$B"; bench_img="${REGISTRY}/benchmarks/${B}:${TAG}"
              PLAT="linux/amd64,linux/arm64" # light overlay → multi-arch is fine
            fi
            if [ "${{ inputs.skip_published }}" = "true" ] && docker buildx imagetools inspect "${REGISTRY}/evals/${eb}--${A}:${TAG}" >/dev/null 2>&1; then echo "skip-published: evals/${eb}--${A}"; continue; fi
            # eval = lean base (sidecar mode); eval-standalone = single-container
            # bundle (gateway+otelcol+process-compose in-image). bake builds eval
            # once, then layers standalone on it via the eval-base context.
            TGT=(eval); [ "$STANDALONE" != "false" ] && TGT+=(eval-standalone)
            ACT=("${TGT[@]}" --provenance=mode=max --sbom=true --push)
            [ "$DRY" = "true" ] && ACT=("${TGT[@]}" --print)
            echo "::group::evals/${eb}--${A}"
            if EVAL_BENCHMARK="$eb" EVAL_AGENT="$A" \
               BENCHMARK_IMAGE="$bench_img" AGENT_IMAGE="${REGISTRY}/agents/${A}:${TAG}" \
               retry docker buildx bake -f containers/docker-bake.hcl -f containers/core/combination.docker-bake.hcl \
                 --set "*.platform=${PLAT}" \
                 "${ACT[@]}"; then :; \
            else echo "::error::combo failed: evals/${eb}--${A}"; fails=$((fails+1)); fi
            echo "::endgroup::"
          done < <(jq -c '.[]' <<< "$ITEMS")
          [ "$fails" -eq 0 ] || { echo "::error::$fails combo(s) failed in shard ${{ matrix.shard.idx }}"; exit 1; }

  # ── CVE gate on the shared bases, then promote :TAG -> :latest ────────────
  # Runs for real releases (tag / explicit version) or whenever the bases were
  # rebuilt — i.e. when there's something new to gate + promote. A frozen-base
  # dev dispatch re-scanning unchanged bases would only surface CVEs disclosed
  # since they were last gated at release, so it's skipped (the dev run isn't
  # publishing :latest anyway — the promotion below is tag-only).
  release-gate:
    needs: [merge, per-task, compose, combos]
    if: always() && needs.merge.result == 'success' && !inputs.dry_run && (github.ref_type == 'tag' || inputs.tag != '' || inputs.rebuild_bases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      - name: CVE gate — scan the shared bases (propagate fleet-wide)
        env:
          EVAL_REGISTRY: ${{ env.REGISTRY }}
          EVAL_TRIVY_TAG: ${{ env.TAG }}
          EVAL_TRIVY_KINDS: core
          EVAL_TRIVY_FROM_REGISTRY: "1"
        run: tests/static/security/trivy.sh image
      - name: Promote :${{ env.TAG }} -> :latest (only after the CVE gate)
        if: env.TAG != 'latest'
        run: |
          # imagetools copies the full manifest incl. provenance/SBOM — no rebuild.
          for kind in core agents benchmarks models gateways; do
            for d in containers/"$kind"/*/; do
              name=$(basename "$d"); case $name in _*) continue ;; esac
              [ -f "${d}docker-bake.hcl" ] || continue
              grep -qE 'eval.benchmark.env="per-task"' "${d}Dockerfile" 2>/dev/null && continue
              ref="${REGISTRY}/${kind}/${name}"
              docker buildx imagetools inspect "${ref}:${TAG}" >/dev/null 2>&1 || continue
              docker buildx imagetools create --tag "${ref}:latest" "${ref}:${TAG}"
            done
          done

  # ── Helm chart at the tag (versioned releases only) ───────────────────────
  chart:
    needs: [release-gate]
    if: github.ref_type == 'tag' || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Publish charts/eval at the tag
        run: |
          ver="${TAG#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package containers/benchmarks/_chart --version "$ver" --app-version "$ver" -d /tmp/chart
          helm push "/tmp/chart/eval-${ver}.tgz" "oci://${REGISTRY}/charts"

  # ── end-of-run report: stages + per-image build time & registry size ──────
  report:
    name: Build-time + size report
    needs: [bases, build, per-task, merge, compose, combos, release-gate, enumerate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Per-image build time + registry size -> summary + size-report
        env:
          GH_TOKEN: ${{ github.token }}
          LEAVES: ${{ needs.enumerate.outputs.leaves }}
        run: |
          # Compressed registry size: resolve the amd64 manifest, sum its layers.
          size_of() {
            local r="$1" d
            d=$(docker buildx imagetools inspect "$r" --raw 2>/dev/null \
              | jq -r '(.manifests//[])|map(select(.platform.architecture=="amd64"))|.[0].digest//empty')
            if [ -n "$d" ]; then
              docker buildx imagetools inspect "${r%:*}@$d" --raw 2>/dev/null | jq '[.layers[].size]|add // 0'
            else
              docker buildx imagetools inspect "$r" --raw 2>/dev/null | jq '[.layers[].size]|add // 0'
            fi
          }
          # Per-leaf build time = its amd64 matrix job's duration (job name
          # "leaf <target> (amd64)"; size below is the amd64 manifest, so pair them).
          api="repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs"
          gh api "$api" --paginate --jq '.jobs[]|select(.name|startswith("leaf ") and endswith("(amd64)"))|[(.name|ltrimstr("leaf ")|rtrimstr(" (amd64)")),(if .completed_at and .started_at then ((.completed_at|fromdateiso8601)-(.started_at|fromdateiso8601)) else 0 end)]|@tsv' > /tmp/dur.tsv 2>/dev/null || true
          basedur=$(gh api "$api" --paginate --jq '.jobs[]|select(.name|startswith("bases (amd64)"))|(if .completed_at and .started_at then ((.completed_at|fromdateiso8601)-(.started_at|fromdateiso8601)) else 0 end)' 2>/dev/null | head -1 || true)
          # Measure every leaf ONCE -> TSV (target, image, build_sec, size_bytes),
          # reused for the durable artifact AND the step-summary table.
          : > /tmp/sizes.tsv
          jq -r '.[]?' <<< "${LEAVES:-[]}" | while read -r T; do
            kind=${T%%-*}; nm=${T#*-}
            case "$kind" in
              benchmark) dir=benchmarks ;; agent) dir=agents ;; model) dir=models ;; gateway) dir=gateways ;; *) dir=$kind ;;
            esac
            img="${REGISTRY}/${dir}/${nm}:${TAG}"
            sz=$(size_of "$img" || echo 0); sz=${sz:-0}   # size_of can emit empty (unmeasurable image) → 0
            dur=$(awk -F'\t' -v t="$T" '$1==t{print $2}' /tmp/dur.tsv || true)
            printf '%s\t%s\t%s\t%s\n' "$T" "$img" "${dur:-0}" "$sz" >> /tmp/sizes.tsv
          done
          # Durable machine-readable report — per-agent/-benchmark size + build time
          # (amd64 compressed), the input for the AUDIT.md size lane + README tables.
          jq -Rn --arg tag "$TAG" --arg run "${GITHUB_RUN_ID}" '
            {tag:$tag, run:$run, arch:"amd64",
             images:[inputs | split("\t") |
               {target:.[0], kind:(.[0]|split("-")[0]), name:(.[0]|sub("^[^-]+-";"")),
                image:.[1], build_seconds:((.[2]|tonumber?)//0), size_bytes:((.[3]|tonumber?)//0)}]}
          ' /tmp/sizes.tsv > size-report.json
          # CSV derived from the JSON we just built (single source; @csv quotes fields).
          { echo "target,kind,name,image,build_seconds,size_bytes,size_mb"
            jq -r '.images[]|[.target,.kind,.name,.image,.build_seconds,.size_bytes,((.size_bytes/1048576*10|round)/10)]|@csv' size-report.json
          } > size-report.csv
          # Step summary (human-readable), appended once (single redirect — no SC2129).
          {
            echo "## Fleet release \`${TAG}\` — stages"
            echo "| stage | result |"; echo "|---|---|"
            echo "| bases | ${{ needs.bases.result }} |"
            echo "| leaves | ${{ needs.build.result }} |"
            echo "| per-task | ${{ needs.per-task.result }} |"
            echo "| compose | ${{ needs.compose.result }} |"
            echo "| combos | ${{ needs.combos.result }} |"
            echo "| CVE gate + :latest | ${{ needs.release-gate.result }} |"
            echo ""
            echo "## Per-image build time + registry size — leaves, biggest first"
            echo "_build = the leaf's own time FROM the frozen base; bases add ${basedur:-?}s, amortized once across all leaves._"
            echo "| image | build | size |"; echo "|---|--:|--:|"
            sort -t$'\t' -k4 -rn /tmp/sizes.tsv \
              | awk -F'\t' '{printf "| %s | %ds | %d MB |\n", $1, $3, $4/1048576}'
            echo ""
            echo "_size-report.json / .csv are uploaded as the \`fleet-size-report\` artifact (durable — feeds audits + README). Combos + per-task sizes are omitted here (hundreds) — query \`ghcr.io/exgentic/evals/*\` / \`benchmarks/*-<task>\`._"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload durable size report
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: fleet-size-report
          path: |
            size-report.json
            size-report.csv
          if-no-files-found: ignore
