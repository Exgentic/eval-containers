name: Release the fleet

# On a `vX.Y.Z` tag, build + push the ENTIRE base fleet (core, agents,
# benchmarks, models, gateways) to GHCR at `:<tag>`, then publish the
# per-benchmark `eval-<benchmark>` compose artifacts + the `charts/eval` Helm
# chart at the same version.
# (Crate releases — `cargo install eval-containers` — live separately in
# release.yml / cargo-dist; this workflow is the container/chart fleet only.)
#
# Fleet-version policy (RULES.md principle 9): the git tag IS the one release
# version; Cargo.toml and benchmarks/_chart/Chart.yaml MUST equal it (guarded
# below + by tests/static/check.rs). Eval combination images (evals/<b>--<a>)
# are built on demand by the CLI, not pre-published, so they are not in the
# fleet build (RELEASE skill: "every benchmark, agent, model, gateway, core").
#
# NOTE: only validated by a real `v*` tag push — a ~150-image build runs on a
# Linux runner, not locally.

on:
  push:
    tags: ['**[0-9]+.[0-9]+.[0-9]+*']  # match release.yml so one tag fires both (delivery/RULES.md:1)
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to publish, e.g. v0.1.0"
        required: true

permissions:
  contents: read
  packages: write # push to GHCR; Actions-pushed packages auto-link to this repo
  # BuildKit attaches the provenance/SBOM attestations with the GHCR push creds
  # below, so no id-token/attestations (OIDC) perms are needed — least privilege.

env:
  REGISTRY: ghcr.io/exgentic

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: azure/setup-helm@v5

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -n "$TAG" ] || TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Guard — git tag matches Cargo.toml and Chart.yaml
        run: |
          ver="${{ steps.ver.outputs.ver }}"
          cargo_ver=$(grep -m1 '^version = ' cli/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          chart_ver=$(grep -m1 '^version: ' containers/benchmarks/_chart/Chart.yaml | awk '{print $2}')
          echo "tag=$ver  cargo=$cargo_ver  chart=$chart_ver"
          if [ "$ver" != "$cargo_ver" ] || [ "$ver" != "$chart_ver" ]; then
            echo "::error::fleet-version mismatch — bump cli/Cargo.toml + containers/benchmarks/_chart/Chart.yaml to $ver before tagging"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push the fleet at the tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # GH Actions secret ref → build secret for the 4 HF-gated benchmarks
        run: |
          # Load every artifact bake file — they carry the `contexts` that let one
          # bake call build the whole graph in dependency order (core → bases →
          # leaves). The parameterized eval combination (containers/core/
          # combination.docker-bake.hcl) is excluded: those images are built on
          # demand, not published.
          mapfile -t FILES < <(ls containers/docker-bake.hcl \
            containers/core/*/docker-bake.hcl containers/agents/*/docker-bake.hcl containers/benchmarks/*/docker-bake.hcl \
            containers/models/*/docker-bake.hcl containers/gateways/*/docker-bake.hcl)
          FARGS=(); for f in "${FILES[@]}"; do FARGS+=(-f "$f"); done
          mapfile -t TARGETS < <(grep -hoE '^target "[^"]+"' "${FILES[@]}" \
            | sed -E 's/^target "([^"]+)"/\1/' | sort -u)
          echo "Building ${#TARGETS[@]} targets at ${REGISTRY}:${TAG}"
          # --set '*.args.REGISTRY=' so every Dockerfile's `FROM ${REGISTRY}/...`
          # resolves to GHCR (the bake context keys already use ${REGISTRY}).
          # --set '*.labels.…source=' stamps the OCI provenance label on every
          # image, matching the CLI build path (naming::REPO_URL / bake::base_args).
          # --provenance/--sbom attach a SLSA build-provenance attestation and a
          # syft SBOM to every pushed image (BuildKit-native, authed with the GHCR
          # push creds — no extra OIDC perms). Read them back with `cosign
          # verify-attestation` or `docker buildx imagetools inspect <img>`.
          # --set '*.secrets=…HF_TOKEN' feeds the 4 HF-gated benchmarks' build-time
          # `RUN --mount=type=secret,id=HF_TOKEN` from the HF_TOKEN env (repo secret);
          # other targets ignore it, and type=secret never lands in a layer.
          docker buildx bake "${FARGS[@]}" \
            --set "*.args.REGISTRY=${REGISTRY}" \
            --set "*.labels.org.opencontainers.image.source=https://github.com/Exgentic/eval-containers" \
            --set "*.secrets=id=HF_TOKEN,env=HF_TOKEN" \
            --provenance=mode=max --sbom=true \
            "${TARGETS[@]}" --push

      - name: Install trivy
        # SHA-pinned (third-party action, per #157). `cache: true` is broken on
        # v0.3.1 (see pre-commit.yml) so the binary downloads each run (~secs).
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1

      - name: CVE gate — scan the base images (trivy)
        env:
          EVAL_REGISTRY: ${{ env.REGISTRY }}
          EVAL_TRIVY_TAG: ${{ steps.ver.outputs.tag }}
          EVAL_TRIVY_KINDS: core
          EVAL_TRIVY_FROM_REGISTRY: "1"
        run: |
          # The core bases are the shared layers every leaf inherits (rule 11), so
          # a base CVE propagates fleet-wide — gate the release on them. Scans the
          # just-pushed images straight from the registry (trivy pulls), reusing
          # the curated .github/.trivyignore. The full per-leaf scan parallelizes
          # in the build-sweep fan-out (follow-up PR), where each matrix job scans
          # its own image cheaply rather than 147 serial pulls on one runner.
          tests/static/security/trivy.sh image

      - name: Tag the fleet :latest (alias of the released version)
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # Runtime + Dockerfiles reference images at :latest, but the bake pushes
          # :$TAG only. Promote each published image's :$TAG to :latest WITHOUT
          # rebuilding — imagetools copies the full manifest incl. the provenance/
          # SBOM attestations. Runs AFTER the CVE gate, so :latest only moves once
          # the bases pass scan. Same dirs-with-a-bake-target enumeration the build
          # uses (skips helper dirs like core/oracle, core/process-compose).
          for kind in core agents benchmarks models gateways; do
            for d in containers/"$kind"/*/; do
              name=$(basename "$d"); case $name in _*) continue ;; esac
              [ -f "${d}docker-bake.hcl" ] || continue
              ref="${REGISTRY}/${kind}/${name}"
              echo "alias ${ref}:${TAG} -> ${ref}:latest"
              docker buildx imagetools create --tag "${ref}:latest" "${ref}:${TAG}"
            done
          done

      - name: Publish per-benchmark compose artifacts
        env:
          EVAL_REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # One self-contained oci://<registry>/eval-<benchmark> per benchmark
          # (naming::compose_artifact): each is the benchmark's compose.yaml
          # flattened (shared services.yaml resolved in via its include: + the
          # benchmark's sidecars), so `run --mode compose` consumes it with a
          # single -f. Artifacts are tiny YAML — publish covers every benchmark.
          cargo build -p eval-containers --quiet
          for d in containers/benchmarks/*/; do
            b=$(basename "$d")
            [ -f "${d}compose.yaml" ] || continue
            echo "::group::publish eval-${b}"
            target/debug/eval-containers build compose --benchmark "$b"
            echo "::endgroup::"
          done

      - name: Publish the Helm chart at the tag
        run: |
          ver="${{ steps.ver.outputs.ver }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package containers/benchmarks/_chart --version "$ver" --app-version "$ver" -d /tmp/chart
          helm push "/tmp/chart/eval-${ver}.tgz" "oci://${REGISTRY}/charts"
