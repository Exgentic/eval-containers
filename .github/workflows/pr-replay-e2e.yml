name: PR replay E2E

# A miniature of the nightly replay E2E for every PR: build what one fixture
# needs and replay it, giving the real "images build AND the compose stack
# (otelcol → gateway → runner) comes up" signal that the daemon-free test.yml
# can't — in a few minutes.
#
# Fixture: replay_bigcodebench_0_zerostack (duckdb-python benchmark + rust agent).
# It exercises the shared core bases + the real compose stack, so a base
# regression (e.g. otelcol failing to boot) shows up at `compose up`.
#
# Bases are BUILT FROM SOURCE (no pulling published :latest): :latest only updates
# on a release, so between releases it lags main and a pulled base can carry stale/
# broken code (e.g. the pre-fix otel). The bakes build the rest in-graph; we
# pre-build only the few images the eval/compose consume as plain refs.
# (process-compose is standalone-only and never touched here.)

on:
  pull_request:
    branches: [main]
    paths: ['containers/**', 'cli/**', 'tests/run/**', '.github/workflows/pr-replay-e2e.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  # One group per PR/branch (head_ref on PRs, ref otherwise) so a new push cancels
  # the in-flight run and the gate only ever evaluates the latest commit.
  group: pr-replay-e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  replay:
    name: replay E2E (zerostack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: replay

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Replay zerostack
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Bake only the bases this fixture consumes as image-refs — all FROM
          # SOURCE (never pull :latest; it lags main between releases). The
          # benchmark/agent bakes build their own bases (duckdb, python-slim) and
          # entrypoint in-graph; we pre-build the few the eval/compose consume
          # directly: gosu (lean eval), model-replay (gateway), otel (sidecar),
          # plus entrypoint + agent-base-rust for safety.
          EVAL_BASES_OVERRIDE: entrypoint agent-base-rust gosu model-replay otel
        run: |
          # pipefail (the bash default here) fails the step if cargo fails; the
          # grep guards against a renamed fixture matching 0 tests (libtest exits 0).
          cargo test -p eval-containers-tests-run --test replay \
            -- --ignored --nocapture --test-threads=1 replay_bigcodebench_0_zerostack \
            | tee replay.log
          if grep -qE "running 0 tests" replay.log; then
            echo "::error::ran 0 tests — fixture renamed?"; exit 1
          fi
