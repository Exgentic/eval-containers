name: PR replay smoke

# A miniature of the nightly replay E2E for every PR: build what one fixture
# needs and replay it, giving the real "images build AND the compose stack
# (otelcol → gateway → runner) comes up" signal that the daemon-free test.yml
# can't — in a few minutes.
#
# Fixture: replay_bigcodebench_0_zerostack (duckdb-python benchmark + rust agent).
# It exercises the shared core bases + the real compose stack, so a base
# regression (e.g. otelcol failing to boot) shows up at `compose up`. otel is
# pure infra (deterministic, decoupled) so its published :latest IS the cache —
# pull it, rebuild only if this PR changed it. Everything else builds from source
# (model-replay is the harness-coupled gateway, so it must match; gosu is FROM'd
# by the lean eval; process-compose is standalone-only and never touched here).

on:
  pull_request:
    branches: [main]
    paths: ['containers/**', 'cli/**', 'tests/run/**', '.github/workflows/pr-replay-smoke.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  # One group per PR/branch (head_ref on PRs, ref otherwise) so a new push cancels
  # the in-flight run and the gate only ever evaluates the latest commit.
  group: pr-replay-smoke-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  replay:
    name: replay smoke (zerostack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need history to diff which bases the PR changed

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: replay

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the deterministic from-source bases; rebuild only the one(s) this PR
      # changed (so a base regression is still caught). EVAL_BASES_OVERRIDE then
      # bakes just those + the cheap image-ref bases — the rest build in-graph.
      - name: Resolve base set
        id: bases
        run: |
          git fetch -q origin main
          # gosu + model-replay build from source: gosu is FROM'd by the lean eval
          # (must be in the store); model-replay is the harness-coupled replay
          # gateway (a stale published image fails its /opt/gateway/server health
          # check → "gateway unhealthy"). otel is pure infra → pull it, rebuild
          # only if changed.
          BUILD="entrypoint agent-base-rust gosu model-replay"
          for entry in "otel containers/core/otel core/otel"; do
            read -r b dir repo <<< "$entry"
            if ! git diff --quiet origin/main...HEAD -- "$dir"; then
              echo "$b changed -> rebuild"; BUILD="$BUILD $b"
            elif docker pull -q "ghcr.io/exgentic/${repo}:latest" >/dev/null 2>&1; then
              echo "$b unchanged -> pulled"
            else
              echo "::warning::$b pull failed -> rebuild"; BUILD="$BUILD $b"
            fi
          done
          echo "bases=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Replay zerostack
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EVAL_BASES_OVERRIDE: ${{ steps.bases.outputs.bases }}
        run: |
          # Exact fixture name (the sole zerostack recording).
          CASES=(replay_bigcodebench_0_zerostack)
          set +e
          cargo test -p eval-containers-tests-run --test replay \
            -- --ignored --nocapture --test-threads=1 "${CASES[@]}" 2>&1 | tee replay.log
          rc=${PIPESTATUS[0]}
          grep -qE "running 0 tests" replay.log && { echo "::error::ran 0 tests — fixture renamed?"; exit 1; }
          exit "${rc}"
