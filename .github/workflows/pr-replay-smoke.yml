name: PR replay smoke

# A miniature of the nightly replay E2E for every PR: build what two fixtures
# need and replay them in one job, giving the real "images build AND the compose
# stack (otelcol → gateway → runner) comes up" signal that the daemon-free
# test.yml can't — in a few minutes.
#
# Fixtures (one duckdb/node, one duckdb-python/rust) cover the shared core bases
# + both agent tiers, so a base regression (e.g. otelcol failing to boot) shows
# up at `compose up`. The three from-source bases (otel/runtime-bundle Go,
# model-replay Rust) are deterministic and consumed only as image-refs, so the
# published :latest IS the cache: pull them, rebuilding from source only the
# one(s) this PR changed. Everything else builds in-graph via the bakes.

on:
  pull_request:
    branches: [main]
    paths: ['containers/**', 'cli/**', 'tests/run/**', '.github/workflows/pr-replay-smoke.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  # One group per PR/branch (head_ref on PRs, ref otherwise) so a new push cancels
  # the in-flight run and the gate only ever evaluates the latest commit.
  group: pr-replay-smoke-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  replay:
    name: replay smoke (aime + zerostack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need history to diff which bases the PR changed

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: replay

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull the deterministic from-source bases; rebuild only the one(s) this PR
      # changed (so a base regression is still caught). EVAL_BASES_OVERRIDE then
      # bakes just those + the cheap image-ref bases — the rest build in-graph.
      - name: Resolve base set
        id: bases
        run: |
          git fetch -q origin main
          BUILD="entrypoint test-exact-match agent-base-node agent-base-rust"
          for entry in \
            "otel containers/core/otel core/otel" \
            "runtime-bundle containers/core/runtime-bundle core/runtime-bundle" \
            "model-replay containers/models/replay models/replay"; do
            read -r b dir repo <<< "$entry"
            if ! git diff --quiet origin/main...HEAD -- "$dir"; then
              echo "$b changed -> rebuild"; BUILD="$BUILD $b"
            elif docker pull -q "ghcr.io/exgentic/${repo}:latest" >/dev/null 2>&1; then
              echo "$b unchanged -> pulled"
            else
              echo "::warning::$b pull failed -> rebuild"; BUILD="$BUILD $b"
            fi
          done
          echo "bases=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Replay aime + zerostack
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EVAL_BASES_OVERRIDE: ${{ steps.bases.outputs.bases }}
        run: |
          # Exact names (not `replay_aime`, which OR-matches all six). One cargo
          # process => the bases are set up once for both.
          CASES=(replay_aime_0_codex replay_bigcodebench_0_zerostack)
          set +e
          cargo test -p eval-containers-tests-run --test replay \
            -- --ignored --nocapture --test-threads=1 "${CASES[@]}" 2>&1 | tee replay.log
          rc=${PIPESTATUS[0]}
          grep -qE "running 0 tests" replay.log && { echo "::error::ran 0 tests — fixture renamed?"; exit 1; }
          exit "${rc}"
