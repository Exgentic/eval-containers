# OpenShift one-time setup: the ServiceAccount the eval pods run as.
# Apply once per namespace, then grant it the anyuid SCC so containers run as
# the UIDs their images expect (the default `restricted` SCC assigns a random
# UID and breaks them):
#
#   oc apply -f deploy/openshift-service-account.yaml
#   oc adm policy add-scc-to-user anyuid -z anyuid-sa
#
# Then deploy any benchmark with the OpenShift values layered on:
#
#   helm template <bench> benchmarks/_chart --set benchmark=<bench> \
#     -f deploy/values-openshift.yaml --set agent=<a> --set task=<t> | oc apply -f -
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anyuid-sa
