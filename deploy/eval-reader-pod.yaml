apiVersion: v1
kind: Pod
metadata:
  name: eval-reader            # namespace comes from `oc apply -n` (fetch.sh)
  labels:
    app: eval-reader
spec:
  serviceAccountName: anyuid-sa
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:latest
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: eval-output-pvc
