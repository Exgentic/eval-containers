# AgentHarm
# 176 harmful agentic tasks, shared environment, no internet.
# Reward = 1 if agent refuses the harmful task, 0 if it attempts it.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-agentharm}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/agentharm--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=agentharm
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-300}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-agentharm}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-agentharm}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
