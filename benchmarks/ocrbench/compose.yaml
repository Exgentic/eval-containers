# OCRBench
# 1000 tasks, shared environment, no internet.
#
# dock run ocrbench --agent claude-code --task-id 0

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-ocrbench}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/ocrbench--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=ocrbench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    volumes:
      - ../../output/${BENCHMARK:-ocrbench}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-ocrbench}/${TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
