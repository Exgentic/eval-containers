# GAIA (General AI Assistants)
# 165 tasks. Internet ENABLED — agent needs web access.
#
# dock run gaia --agent claude-code --task-id gaia_001

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-gaia}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-ghcr.io/dock-eval}/evals/gaia--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=gaia
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-600}
    volumes:
      - ../../output/${BENCHMARK:-gaia}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-gaia}/${TASK_ID:-default}/task:/output/task:rw
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
  external:
    driver: bridge
