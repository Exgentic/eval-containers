# LegalBench
# 162 tasks across 40 legal reasoning subtasks, shared environment, no internet.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-legalbench}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/legalbench--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_TAG:-latest}
    environment:
      - DOCK_BENCHMARK=legalbench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-legalbench}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-legalbench}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

networks:
  internal:
    internal: true
