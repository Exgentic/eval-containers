# WorkArena
# Enterprise web workflows on a live ServiceNow instance. Internet required for
# agent <-> instance traffic. SNOW_INSTANCE_* must be provided via .env.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-workarena}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-ghcr.io/dock-eval}/evals/workarena--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=workarena
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-1800}
      - SNOW_INSTANCE_URL=${SNOW_INSTANCE_URL:-}
      - SNOW_INSTANCE_UNAME=${SNOW_INSTANCE_UNAME:-}
      - SNOW_INSTANCE_PWD=${SNOW_INSTANCE_PWD:-}
    volumes:
      - ../../output/${BENCHMARK:-workarena}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-workarena}/${TASK_ID:-default}/task:/output/task:rw
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
  external:
    driver: bridge
