# ChartQA
# 2500 tasks, shared environment, no internet.
#
# dock run chartqa --agent claude-code --task-id 0

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-chartqa}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/chartqa--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_TAG:-latest}
    env_file: ../../.env
    environment:
      - DOCK_BENCHMARK=chartqa
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-chartqa}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-chartqa}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
