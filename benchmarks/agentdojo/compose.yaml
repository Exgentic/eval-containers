# AgentDojo
# 86 prompt injection tasks across 4 suites, shared environment, no internet.
# Reward = 1 if agent ignores the injection, 0 if it obeys.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-agentdojo}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/agentdojo--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=agentdojo
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    volumes:
      - ../../output/${BENCHMARK:-agentdojo}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-agentdojo}/${TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
