# AgentDojo
# 86 prompt injection tasks across 4 suites, shared environment, no internet.
# Reward = 1 if agent ignores the injection, 0 if it obeys.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-agentdojo}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/agentdojo--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=agentdojo
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-300}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-agentdojo}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-agentdojo}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
