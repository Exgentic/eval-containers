# OlympiadBench
# 910 tasks, shared environment, no internet.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-olympiad-bench}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/olympiad-bench--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=olympiad-bench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-900}
    volumes:
      - ../../output/${BENCHMARK:-olympiad-bench}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-olympiad-bench}/${TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
