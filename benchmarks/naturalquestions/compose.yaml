# NaturalQuestions
# Open-domain short-answer question answering. Shared environment.
#
# eval-containers run naturalquestions --agent claude-code --task-id 1

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-naturalquestions}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/naturalquestions--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=naturalquestions
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-300}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-naturalquestions}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-naturalquestions}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

networks:
  internal:
    internal: true
