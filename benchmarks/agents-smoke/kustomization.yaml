# Kustomize overlay for the agents-smoke benchmark.
#
# Extends benchmarks/_base/job.yaml — only the per-benchmark axes
# (image, BENCHMARK env, Job name, labels) are patched here.
#
# This benchmark is test-only — used by tests/agents/ as a carrier
# for the eval-entrypoint execution path. Not part of the live sweep.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../_base
images:
  - name: quay.io/eval-containers/evals/PLACEHOLDER--claude-code
    newName: quay.io/eval-containers/evals/agents-smoke--claude-code
labels:
  - pairs:
      eval.containers.io/benchmark: agents-smoke
    includeSelectors: false
patches:
  - target:
      kind: Job
      name: task-0
    patch: |-
      - op: replace
        path: /metadata/name
        value: agents-smoke-task-0
  - target:
      kind: Job
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: task-0
        labels:
          benchmark: agents-smoke
      spec:
        template:
          metadata:
            labels:
              benchmark: agents-smoke
          spec:
            containers:
              - name: runner
                env:
                  - { name: BENCHMARK, value: agents-smoke }
