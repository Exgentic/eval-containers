# APPS (Measuring Coding Challenge Competence)
# 5000 tasks, shared environment, no internet.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-apps}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/apps--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_TAG:-latest}
    environment:
      - DOCK_BENCHMARK=apps
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-600}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-apps}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-apps}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
