# BrowseComp (OpenAI)
# 1266 tasks. Internet ENABLED — agent must browse the live web.
#
# eval-containers run browsecomp --agent claude-code --task-id browsecomp_001

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-browsecomp}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/browsecomp--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=browsecomp
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-600}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-browsecomp}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-browsecomp}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
  external:
    driver: bridge
