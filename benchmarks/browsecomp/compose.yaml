# BrowseComp (OpenAI)
# 1266 tasks. Internet ENABLED — agent must browse the live web.
#
# dock run browsecomp --agent claude-code --task-id browsecomp_001

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-browsecomp}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/browsecomp--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_TAG:-latest}
    environment:
      - DOCK_BENCHMARK=browsecomp
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-600}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-browsecomp}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-browsecomp}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
  external:
    driver: bridge
