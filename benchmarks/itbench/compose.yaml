# ITBench (ITBench-Lite)
# IT automation benchmark. Shared environment, externally graded skeleton.
#
# NOTE: Real ITBench runs expect a multi-container stack (K8s, Prometheus,
# target apps, OPA) that this compose file does NOT yet wire up. Use as a
# task-materialisation shim until the sidecar harness lands.
#
# eval-containers run itbench --agent claude-code --task-id 1

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-itbench}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/itbench--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=itbench
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-1200}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-itbench}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-itbench}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
