# ITBench (ITBench-Lite)
# IT automation benchmark. Shared environment, externally graded skeleton.
#
# NOTE: Real ITBench runs expect a multi-container stack (K8s, Prometheus,
# target apps, OPA) that this compose file does NOT yet wire up. Use as a
# task-materialisation shim until the sidecar harness lands.
#
# dock run itbench --agent claude-code --task-id 1

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-itbench}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/itbench--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_TAG:-latest}
    environment:
      - DOCK_BENCHMARK=itbench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-1200}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-itbench}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-itbench}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
