apiVersion: batch/v1
kind: Job
metadata:
  name: visualwebarena-task-0
  labels:
    benchmark: visualwebarena
    agent: claude-code
    task: "0"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 2100
  template:
    metadata:
      labels:
        benchmark: visualwebarena
        agent: claude-code
        task: "0"
    spec:
      restartPolicy: Never
      shareProcessNamespace: true
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z proxy 8080 && nc -z classifieds 80 && nc -z reddit 80 && nc -z shopping 80; do echo waiting; sleep 2; done"]
      containers:
        - name: otelcol
          image: quay.io/eval-containers/core/otel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
            - { name: health,    containerPort: 13133 }
          volumeMounts:
            - { name: output, mountPath: /output }

        - name: gateway
          image: quay.io/eval-containers/models/gpt-5.4--bifrost:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: gateway, containerPort: 4000 }
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: { name: eval-secrets, key: OPENAI_API_KEY }
            - name: OPENAI_API_BASE
              valueFrom:
                secretKeyRef: { name: eval-secrets, key: OPENAI_API_BASE }
            - { name: EVAL_MODEL, value: openai/azure/gpt-5.4 }
            - { name: HOST,       value: 127.0.0.1 }

        - name: runner
          image: quay.io/eval-containers/evals/visualwebarena--claude-code:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args: ["/root/entrypoint.sh; rc=$?; /usr/local/bin/reap-sidecars; exit $rc"]
          env:
            - { name: BENCHMARK,                   value: visualwebarena }
            - { name: AGENT,                       value: claude-code }
            - { name: MODEL,                       value: gpt-5.4-bifrost }
            - { name: TASK_ID,                     value: "0" }
            - { name: TIMEOUT,                     value: "1800" }
            - { name: HTTP_PROXY,                  value: http://proxy:8080 }
            - { name: HTTPS_PROXY,                 value: http://proxy:8080 }
            - { name: NO_PROXY,                    value: "localhost,127.0.0.1" }
            - { name: CLASSIFIEDS_URL,             value: http://classifieds:80 }
            - { name: REDDIT_URL,                  value: http://reddit:80 }
            - { name: SHOPPING_URL,                value: http://shopping:80 }
            - { name: ANTHROPIC_BASE_URL,          value: http://localhost:4000/anthropic }
            - { name: OPENAI_BASE_URL,             value: http://localhost:4000/openai/v1 }
            - { name: GOOGLE_GEMINI_BASE_URL,      value: http://localhost:4000/genai }
            - { name: ANTHROPIC_API_KEY,           value: sk-proxy }
            - { name: OPENAI_API_KEY,              value: sk-proxy }
            - { name: GEMINI_API_KEY,              value: sk-proxy }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: http://localhost:4318 }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "4",    memory: "16Gi" }
          volumeMounts:
            - { name: output, mountPath: /output }
            - { name: tmp,    mountPath: /tmp }
            - { name: logs,   mountPath: /logs }

      volumes:
        - { name: output, emptyDir: {} }
        - { name: tmp,    emptyDir: { medium: Memory, sizeLimit: 1Gi } }
        - { name: logs,   emptyDir: { medium: Memory, sizeLimit: 100Mi } }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  labels: { benchmark: visualwebarena, app: proxy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: proxy }
  template:
    metadata:
      labels: { benchmark: visualwebarena, app: proxy }
    spec:
      containers:
        - name: proxy
          image: mitmproxy/mitmproxy:latest
          command: ["mitmdump"]
          args: ["--mode", "regular", "--listen-port", "8080", "--set", "hardump=/output/network.har"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  labels: { benchmark: visualwebarena }
spec:
  selector: { app: proxy }
  ports: [{ port: 8080, targetPort: 8080 }]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifieds
  labels: { benchmark: visualwebarena, app: classifieds }
spec:
  replicas: 1
  selector: { matchLabels: { app: classifieds } }
  template:
    metadata:
      labels: { benchmark: visualwebarena, app: classifieds }
    spec:
      containers:
        - name: classifieds
          image: ghcr.io/web-arena-x/visualwebarena-classifieds:latest
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
