benchmark: visualwebarena
activeDeadlineSeconds: 2100
timeout: '1800'
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: '4'
    memory: 16Gi
runnerExtraEnv:
- name: HTTP_PROXY
  value: http://proxy:8080
- name: HTTPS_PROXY
  value: http://proxy:8080
- name: NO_PROXY
  value: localhost,127.0.0.1
- name: CLASSIFIEDS_URL
  value: http://classifieds:80
- name: REDDIT_URL
  value: http://reddit:80
- name: SHOPPING_URL
  value: http://shopping:80
initContainers:
- name: wait-for-deps
  image: busybox:1.36
  command:
  - sh
  - -c
  - until nc -z proxy 8080 && nc -z classifieds 80 && nc -z reddit 80 && nc -z shopping 80; do echo waiting; sleep 2; done
extraManifests:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: proxy
    labels:
      benchmark: visualwebarena
      app: proxy
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: proxy
    template:
      metadata:
        labels:
          benchmark: visualwebarena
          app: proxy
      spec:
        containers:
        - name: proxy
          image: mitmproxy/mitmproxy:latest
          command:
          - mitmdump
          args:
          - --mode
          - regular
          - --listen-port
          - '8080'
          - --set
          - hardump=/output/network.har
          ports:
          - containerPort: 8080
- apiVersion: v1
  kind: Service
  metadata:
    name: proxy
    labels:
      benchmark: visualwebarena
  spec:
    selector:
      app: proxy
    ports:
    - port: 8080
      targetPort: 8080
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: classifieds
    labels:
      benchmark: visualwebarena
      app: classifieds
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: classifieds
    template:
      metadata:
        labels:
          benchmark: visualwebarena
          app: classifieds
      spec:
        containers:
        - name: classifieds
          image: ghcr.io/web-arena-x/visualwebarena-classifieds:latest
          ports:
          - containerPort: 80
- apiVersion: v1
  kind: Service
  metadata:
    name: classifieds
    labels:
      benchmark: visualwebarena
  spec:
    selector:
      app: classifieds
    ports:
    - port: 80
      targetPort: 80
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: reddit
    labels:
      benchmark: visualwebarena
      app: reddit
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: reddit
    template:
      metadata:
        labels:
          benchmark: visualwebarena
          app: reddit
      spec:
        containers:
        - name: reddit
          image: ghcr.io/web-arena-x/visualwebarena-reddit:latest
          ports:
          - containerPort: 80
- apiVersion: v1
  kind: Service
  metadata:
    name: reddit
    labels:
      benchmark: visualwebarena
  spec:
    selector:
      app: reddit
    ports:
    - port: 80
      targetPort: 80
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: shopping
    labels:
      benchmark: visualwebarena
      app: shopping
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: shopping
    template:
      metadata:
        labels:
          benchmark: visualwebarena
          app: shopping
      spec:
        containers:
        - name: shopping
          image: ghcr.io/web-arena-x/visualwebarena-shopping:latest
          ports:
          - containerPort: 80
- apiVersion: v1
  kind: Service
  metadata:
    name: shopping
    labels:
      benchmark: visualwebarena
  spec:
    selector:
      app: shopping
    ports:
    - port: 80
      targetPort: 80
