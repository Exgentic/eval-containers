# Cybench
# Professional CTF cybersecurity benchmark. Per-task images.
#
# dock run cybench --agent claude-code --task-id <category>/<task>

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${DOCK_BENCHMARK:-cybench}/${DOCK_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/evals/cybench-${DOCK_TASK_ID}--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - DOCK_BENCHMARK=cybench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-3600}
    volumes:
      - ../../output/${DOCK_BENCHMARK:-cybench}/${DOCK_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${DOCK_BENCHMARK:-cybench}/${DOCK_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
