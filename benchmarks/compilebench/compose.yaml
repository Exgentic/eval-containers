# CompileBench
# Compilation benchmark. Per-task images (task ID in image name).
#
# eval-containers run compilebench --agent claude-code --task-id example_task

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-compilebench}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/compilebench-${EVAL_TASK_ID}--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=compilebench
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-900}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-compilebench}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-compilebench}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

networks:
  internal:
    internal: true
