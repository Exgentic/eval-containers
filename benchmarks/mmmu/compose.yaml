# MMMU (Massive Multi-discipline Multimodal Understanding)
# 900 tasks, shared environment, no internet.
#
# eval-containers run mmmu --agent claude-code --task-id 0

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-mmmu}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/mmmu--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=mmmu
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-300}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-mmmu}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-mmmu}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
