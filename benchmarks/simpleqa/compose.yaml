# SimpleQA
# Factual question answering benchmark. Shared environment.
#
# dock run simpleqa --agent claude-code --task-id 1

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-ghcr.io/dock-eval}/evals/simpleqa--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    environment:
      - BENCHMARK=simpleqa
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

networks:
  internal:
    internal: true
