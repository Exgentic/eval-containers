# SWE-Gym
# 2438 Python SWE tasks, shared-env. Externally graded via upstream harness.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${EVAL_BENCHMARK:-swe-gym}/${EVAL_TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/swe-gym--${EVAL_AGENT:-claude-code}:${EVAL_AGENT_TAG:-latest}
    environment:
      - EVAL_BENCHMARK=swe-gym
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-1800}
    volumes:
      - ../../output/${EVAL_BENCHMARK:-swe-gym}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${EVAL_BENCHMARK:-swe-gym}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G

networks:
  internal:
    internal: true
