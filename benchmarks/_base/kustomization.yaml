# Shared Kustomize base for every benchmark's k8s Job.
#
# This file is NOT meant to be applied directly — `job.yaml` has
# `PLACEHOLDER` values that fail k8s validation. Per-benchmark
# overlays at `benchmarks/<x>/kustomization.yaml` extend this base
# and patch in the real benchmark name + image:
#
#   resources: [../_base]
#   images:    [{name: …/PLACEHOLDER--claude-code,
#                newName: …/<bench>--claude-code}]
#   patches:   [{rename Job to <bench>-task-0,
#                set BENCHMARK env to <bench>,
#                set benchmark labels to <bench>}]
#
# Everything else (gateway URL, OTEL endpoint, API keys, TIMEOUT,
# MODEL default, AGENT default, resources, volumes) is shared via
# this base — change once here to update the whole fleet.
#
# See benchmarks/RULES.md rule 99 for the overlay convention.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - job.yaml
