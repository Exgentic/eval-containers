# MT-Bench - multi-turn chat with LLM-as-judge grading
# 160 tasks (80 questions x 2 turns), shared environment, no internet.

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-mt-bench}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-ghcr.io/dock-eval}/evals/mt-bench--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=mt-bench
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-300}
    volumes:
      - ../../output/${BENCHMARK:-mt-bench}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-mt-bench}/${TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

networks:
  internal:
    internal: true
