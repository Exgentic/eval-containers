# Kumo
# Complex reasoning benchmark. Shared environment.
#
# dock run kumo --agent claude-code --task-id 1

services:
  model:
    extends:
      file: ../../compose/services.yaml
      service: model
    env_file: ../../.env
    volumes:
      - ../../output/${BENCHMARK:-kumo}/${TASK_ID:-default}/model:/output:rw

  eval:
    extends:
      file: ../../compose/services.yaml
      service: eval
    image: ${DOCK_REGISTRY:-ghcr.io/dock-eval}/evals/kumo--${DOCK_AGENT:-claude-code}:${DOCK_AGENT_VERSION:-latest}
    env_file: ../../.env
    environment:
      - BENCHMARK=kumo
      - DOCK_TIMEOUT=${DOCK_TIMEOUT:-3600}
    volumes:
      - ../../output/${BENCHMARK:-kumo}/${TASK_ID:-default}/agent:/output/agent:rw
      - ../../output/${BENCHMARK:-kumo}/${TASK_ID:-default}/task:/output/task:rw
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G

networks:
  internal:
    internal: true
