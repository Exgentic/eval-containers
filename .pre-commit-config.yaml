# Pre-commit gates for eval-containers. Self-contained — no helper scripts.
#
# Principle: hooks run fast, deterministic, non-compiling checks only.
# Anything that invokes the compiler (clippy, cargo test) is slow and
# environment-dependent, so it lives in CI, not in a git hook. cargo fmt
# stays because it is syntactic and instant.
#
# pre-commit stage: hygiene + fmt (block a commit).
# commit-msg stage: DCO Signed-off-by autofix.
#
# Install both stages once:
#   pre-commit install --hook-type pre-commit --hook-type commit-msg

repos:
  # --- DCO: ensure every commit message carries a Signed-off-by trailer ---
  # Appends one from git config if (and only if) missing — same as `git commit -s`.
  # Matches the GitHub DCO check that gates PRs.
  - repo: local
    hooks:
      - id: dco-sign-off
        name: DCO Signed-off-by autofix
        # Single-quoted YAML so the embedded bash (double-quotes, \n, colon)
        # survives verbatim; inner ' are doubled per YAML rules.
        entry: 'bash -c ''f="$1"; grep -qiE "^Signed-off-by: .+ <.+@.+>" "$f" && exit 0; n=$(git config user.name || true); e=$(git config user.email || true); if [ -z "$n" ] || [ -z "$e" ]; then echo "Missing Signed-off-by and git user.name/email unset; use: git commit -s" >&2; exit 1; fi; [ -n "$(tail -c1 "$f")" ] && printf "\n" >> "$f"; printf "Signed-off-by: %s <%s>\n" "$n" "$e" >> "$f"'' --'
        language: system
        stages: [commit-msg]

  # --- Rust formatting (no compile) ---
  # clippy and cargo test are intentionally in CI (test.yml), not here: a hook
  # is the wrong place for slow, toolchain-dependent checks — it breeds --no-verify.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        types: [rust]
        pass_filenames: false

  # --- Secrets: uses the repo's .gitleaks.toml allowlist ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # --- Secrets: detect-secrets (entropy + keyword baseline scanner) ---
  # A second, independent layer beside gitleaks (rule-based) and trivy
  # (build-arg secrets): detect-secrets leans on entropy + per-vendor keyword
  # plugins, so it catches shapes a pure ruleset can miss. New findings are
  # diffed against .secrets.baseline; the baseline's own filters exclude the
  # recorded trajectory fixtures (.jsonl), lockfiles, and the two pure-false-
  # positive idioms in this repo — 40-char git-SHA upstream pins and
  # `os.environ/...` LiteLLM key references. The 6 baselined findings are
  # reviewed non-secrets (sk-proxy placeholders, `secrets: inherit`, a CTF
  # repo path). Regenerate + re-audit when a real new finding appears:
  #   detect-secrets scan --baseline .secrets.baseline && \
  #     detect-secrets audit .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^\.secrets\.baseline$

  # --- Generic hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(jsonl|lock)$'
      - id: end-of-file-fixer
        exclude: '\.(jsonl|lock)$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
        args: [--allow-multiple-documents]   # k8s manifest bundles (e.g. deploy/kueue.yaml)
        # Helm templates are Go-templated, not valid YAML; helm-lint covers them.
        exclude: ^containers/benchmarks/_chart/templates/
      - id: check-json

  # --- Dockerfiles: hadolint ---
  # failure-threshold=error keeps the pervasive stylistic findings advisory
  # (non-blocking); only parse/error-level issues fail. Ignored rules:
  #   DL3059 staged RUNs · DL3007 :latest (pinned via bake) · DL3008/DL3018 apt/apk
  #   version pins · DL3029 --platform in FROM (multi-arch bake).
  # The 6 excluded images embed a `#!/bin/bash` shebang inside a heredoc, which
  # trips a separate hadolint parser bug (hadolint/hadolint#806) that formatting
  # can't fix. Everything else parses after the heredoc blank-line normalization.
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args:
          - --failure-threshold=error
          - --ignore=DL3059
          - --ignore=DL3007
          - --ignore=DL3008
          - --ignore=DL3018
          - --ignore=DL3029
        exclude: ^containers/benchmarks/(aider-polyglot|bigcodebench|humaneval|humanevalplus|mbpp|mbppplus|skills-bench)/Dockerfile$

  # --- Compose files: schema-validate against the Compose spec (no daemon) ---
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-compose-spec
        files: (^|/)compose\.ya?ml$   # repo uses bare compose.yaml, not docker-compose.yaml

  # --- Helm chart lint ---
  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint (_chart)
        entry: helm lint containers/benchmarks/_chart
        language: system
        files: ^containers/benchmarks/_chart/
        pass_filenames: false

  # --- Dockerfiles: eval-domain policy (conftest/OPA) ---
  # The eval LABEL contract + pin allowlist + eval-specific hygiene, migrated
  # from the Rust dockerfile_inspection/check/upstream_pins suites for #114.
  # hadolint (above) owns generic Dockerfile hygiene; this owns the eval rules.
  - repo: local
    hooks:
      - id: conftest-dockerfile
        name: conftest dockerfile policy (eval LABEL/pin/hygiene)
        entry: tests/static/policy/dockerfile/run.sh
        language: system
        files: (^containers/.*/Dockerfile$|^tests/static/policy/dockerfile/)
        pass_filenames: false

  # --- Compose files: eval-domain policy (conftest/OPA) ---
  # The compose markers + the principle-9 image-tag-axis rule. Schema validation
  # is the check-compose-spec hook above; this adds the eval conventions.
  - repo: local
    hooks:
      - id: conftest-compose
        name: conftest compose policy (eval markers + tag axis)
        entry: tests/static/compose.sweep.sh
        language: system
        files: (^containers/benchmarks/.*/compose\.ya?ml$|^containers/compose/.*\.ya?ml$|^tests/static/policy/compose/)
        pass_filenames: false

  # --- IaC / misconfig: trivy config ---
  # Net-new for #114: trivy config over containers/ Dockerfiles + compose
  # (misconfig + secret-in-build-arg). Complements gitleaks (secret values).
  - repo: local
    hooks:
      - id: trivy-config
        name: trivy config (IaC/misconfig over containers/)
        entry: tests/static/security/trivy.sh config
        language: system
        files: (^containers/.*\.ya?ml$|^containers/.*/Dockerfile$|^\.trivyignore$)
        pass_filenames: false

  # --- Shell ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Fail on warnings/errors; style+info nitpicks (SC2001 regex-capture
        # seds, SC2012 ls-for-newest, SC2015 intentional A&&B||C) are advisory.
        args: [--severity=warning]

  # --- Python ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
      - id: ruff-format

  # --- Spelling ---
  # Generic, fast, deterministic — fits the fast-hooks-only principle above.
  # Skips lockfiles and recorded JSONL fixtures (replay trajectories), which
  # carry verbatim tool output that isn't ours to spell-correct.
  # Ignore list is all domain terms, not typos:
  #   ans/fo      — Python locals in benchmark Dockerfiles (`ans = t['answer']`, `as fo:`)
  #   froms/copys — plural Dockerfile FROM/COPY instructions in prose & tests
  #   rouge       — the ROUGE metric (codespell reads it as "rogue")
  #   xdescribe   — the Jest/Jasmine API, named in an aider-polyglot transform
  #   auxillary   — verbatim in Rosetta's own error string; "fixing" it breaks the match
  #   re-declare* — valid hyphenation in a rego test + Dockerfiles (this codespell
  #                 pin still flags it; newer releases dropped several such entries)
  #   crate       — Rust's compilation unit, everywhere in cli/ and tests/
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: [-L, "ans,froms,copys,fo,auxillary,xdescribe,rouge,re-declare,re-declared,re-declaring,crate"]
        exclude: '\.(jsonl|lock)$'
