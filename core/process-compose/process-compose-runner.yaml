# Compose / k8s overlay. Applied on top of process-compose.yaml when
# otelcol + gateway are external siblings (docker-compose, k8s pod).
# Disables the in-container otelcol+gateway processes — agent +
# verifier + result are inherited from the base file.
#
# /usr/local/bin/run picks the right file set:
#   single-image  : -f process-compose.yaml
#   external infra: -f process-compose.yaml -f process-compose-runner.yaml
#
# process-compose merges multiple `-f` configs by overlaying — later
# files override earlier per-process keys. `disabled: true` here drops
# the in-container instances cleanly.

version: "0.5"

processes:
  otelcol:
    disabled: true
  gateway:
    disabled: true
