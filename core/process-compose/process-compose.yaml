# Single-image orchestration. Three units, mirroring the other two modes:
#   otelcol → gateway → runner
#
# Same shape as compose mode (compose/services.yaml) and k8s mode
# (benchmarks/_chart/templates/job.yaml): otelcol + gateway are the
# long-running daemons, and the runner is the shared /entrypoint.sh
# (materialize → agent → grade → result) those modes launch as a sibling
# service/container. Here all three run as process-compose processes.
#
# /usr/local/bin/run sets ANTHROPIC_BASE_URL/OPENAI_BASE_URL to 127.0.0.1
# before exec'ing process-compose, so the runner's /entrypoint.sh →
# eval-entrypoint.sh sees a wired gateway and runs its inline pipeline
# against localhost instead of branching back into single-image mode.
#
# Dependency edges mirror the siblings: gateway waits for otelcol healthy
# (its health_check on :13133), runner waits for gateway healthy (its
# /opt/gateway/health probe) — i.e. processes:→services:/containers:,
# command:→image:, readiness_probe:→healthcheck:/startupProbe,
# 127.0.0.1→service-name DNS / Pod loopback.

version: "0.5"

processes:
  otelcol:
    command: /usr/local/bin/otelcol --config=/etc/otelcol/config.yaml
    readiness_probe:
      http_get:
        host: 127.0.0.1
        scheme: http
        port: 13133
        path: /
      initial_delay_seconds: 0
      period_seconds: 1
      timeout_seconds: 1
      failure_threshold: 30
    availability:
      restart: "no"
    log_location: /output/model/otelcol.log

  gateway:
    command: /opt/gateway/start
    readiness_probe:
      # Each gateway image bakes its own /opt/gateway/health that knows
      # the right path (bifrost: /api/health; litellm: /health/liveness).
      # exec keeps process-compose.yaml gateway-agnostic.
      exec:
        command: /opt/gateway/health
      initial_delay_seconds: 3
      period_seconds: 1
      timeout_seconds: 2
      failure_threshold: 60
    depends_on:
      otelcol:
        condition: process_healthy
    availability:
      restart: "no"
    log_location: /output/model/gateway.log

  runner:
    # The shared entrypoint: materialize → agent → grade → result, run
    # against the local gateway. Identical to the runner compose/k8s launch.
    command: /entrypoint.sh
    depends_on:
      gateway:
        condition: process_healthy
    availability:
      restart: "no"
      # The runner is the only finite unit; when it exits, process-compose
      # tears down the otelcol+gateway daemons and the container exits.
      exit_on_end: true
    log_location: /output/task/runner.log
