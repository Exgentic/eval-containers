# Shared service definitions for Dock benchmarks.
# Benchmark compose files use `extends` to inherit these.
#
# Note: volume mounts are NOT defined here because `extends` resolves
# relative paths from this file's location, not the benchmark's.
# Each benchmark compose file defines its own output volume.

services:
  model:
    image: ${DOCK_REGISTRY:-quay.io/dock-eval}/models/${DOCK_MODEL:-claude-sonnet-4}:latest
    environment:
      # Hard cap on model spend per run. The litellm entrypoint reads
      # this env var and rewrites the max_budget field in config.yaml
      # before starting the proxy. When spend crosses the cap, litellm
      # returns BudgetExceededError and the agent's next request fails.
      # Default $1; override via `dock run --max-budget <N>` or the
      # DOCK_MODEL_MAX_BUDGET env var. See compose/RULES.md rule 10.
      - DOCK_MODEL_MAX_BUDGET=${DOCK_MODEL_MAX_BUDGET:-1}
    networks:
      - internal
      - default
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  eval:
    environment:
      - ANTHROPIC_BASE_URL=http://model:4000
      - OPENAI_BASE_URL=http://model:4000
      - TASK=${TASK:-}
      - DOCK_TASK_ID=${DOCK_TASK_ID:-}
      - EXPECTED_ANSWER=${EXPECTED_ANSWER:-}
    depends_on:
      model:
        condition: service_healthy
    networks:
      - internal
    tmpfs:
      - /logs:size=100M
      - /tmp:size=1G
