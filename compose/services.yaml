# Shared service definitions for Eval Containers benchmarks.
# Benchmark compose files use `extends` to inherit these.
#
# Note: volume mounts are NOT defined here because `extends` resolves
# relative paths from this file's location, not the benchmark's.
# Each benchmark compose file defines its own output volume.

services:
  model:
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/models/${EVAL_MODEL:-claude-sonnet-4}:latest
    environment:
      # Hard cap on model spend per run. The litellm entrypoint reads
      # this env var and rewrites the max_budget field in config.yaml
      # before starting the proxy. When spend crosses the cap, litellm
      # returns BudgetExceededError and the agent's next request fails.
      # Default $1; override via `eval-containers run --max-budget <N>` or the
      # EVAL_MODEL_MAX_BUDGET env var. See compose/RULES.md rule 10.
      - EVAL_MODEL_MAX_BUDGET=${EVAL_MODEL_MAX_BUDGET:-1}
    networks:
      - internal
      - default
    healthcheck:
      # /health exercises every configured model alias with a real
      # upstream call and times out. /health/liveness signals only
      # "uvicorn is accepting traffic" — the right gate for compose.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveness')"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s

  eval:
    environment:
      - ANTHROPIC_BASE_URL=http://model:4000
      - OPENAI_BASE_URL=http://model:4000
      # Dummy API keys for SDK client initialization. The agent talks
      # to the proxy at model:4000 which holds the real keys. The
      # agent never sees real credentials (env_file removed from eval).
      - ANTHROPIC_API_KEY=sk-proxy
      - OPENAI_API_KEY=sk-proxy
      # Non-secret config vars the agent needs (previously from env_file)
      - EVAL_MODEL=${EVAL_MODEL:-claude-sonnet-4}
      - EVAL_TIMEOUT=${EVAL_TIMEOUT:-300}
      - TASK=${TASK:-}
      - EVAL_TASK_ID=${EVAL_TASK_ID:-}
      - EXPECTED_ANSWER=${EXPECTED_ANSWER:-}
    depends_on:
      model:
        condition: service_healthy
    networks:
      - internal
    tmpfs:
      - /logs:size=100M
      - /tmp:size=1G
