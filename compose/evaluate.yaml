# compose/evaluate.yaml — the unified, hub-native Eval Containers evaluation.
#
# One compose file for every (benchmark, agent, model, task) combination.
# Published to the registry as an OCI artifact at:
#
#     oci://quay.io/eval-containers/evaluate
#
# Users run:
#
#     EVAL_BENCHMARK=aime EVAL_TASK_ID=0 EVAL_AGENT=codex EVAL_MODEL=gpt-5.4 \
#       docker compose -f oci://quay.io/eval-containers/evaluate up --abort-on-container-exit
#
# The per-benchmark files in `benchmarks/<name>/compose.yaml` are the
# developer workflow (`eval-containers run --local`). This file is the production
# entrypoint for humans and CI.

services:
  eval:
    # Eval image is the build-time combination of a benchmark and an agent.
    # Container tag is controlled by $EVAL_BENCHMARK_TAG / $EVAL_AGENT_TAG
    # (though in practice the eval image has one tag per combination cut
    # by CI; see compose/RULES.md for how eval tags are produced).
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/evals/${EVAL_BENCHMARK}--${EVAL_AGENT:-claude-code}:${EVAL_BENCHMARK_TAG:-latest}
    environment:
      # Axis selection
      - EVAL_BENCHMARK
      - EVAL_AGENT
      - EVAL_TASK_ID
      # Internal version overrides (entrypoint installs at container start)
      - EVAL_BENCHMARK_VERSION
      - EVAL_AGENT_VERSION
      # Proxy wiring (agent's LLM calls go here)
      - ANTHROPIC_BASE_URL=http://model:4000
      - OPENAI_BASE_URL=http://model:4000
      # Runtime
      - EVAL_TIMEOUT
      # Legacy interface (populated by per-benchmark entrypoints)
      - TASK
      - EXPECTED_ANSWER
    depends_on:
      model:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - ./output/${EVAL_BENCHMARK}/${EVAL_TASK_ID:-default}/agent:/output/agent:rw
      - ./output/${EVAL_BENCHMARK}/${EVAL_TASK_ID:-default}/task:/output/task:rw
    tmpfs:
      - /logs:size=100M
      - /tmp:size=1G
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  model:
    image: ${EVAL_REGISTRY:-quay.io/eval-containers}/models/${EVAL_MODEL:-claude-sonnet-4}:${EVAL_MODEL_TAG:-latest}
    env_file: .env
    environment:
      - EVAL_LITELLM_VERSION
      # Hard cap on model spend per run (see compose/services.yaml).
      - EVAL_MODEL_MAX_BUDGET=${EVAL_MODEL_MAX_BUDGET:-1}
    networks:
      - internal
      - default
    volumes:
      - ./output/${EVAL_BENCHMARK}/${EVAL_TASK_ID:-default}/model:/output:rw
    healthcheck:
      # /health exercises every model alias with a real upstream call
      # (20+ Azure/OpenAI roundtrips) and routinely exceeds the 5s
      # healthcheck timeout. /health/liveness returns immediately once
      # the uvicorn worker is accepting traffic — the correct signal
      # for "the proxy process is up".
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveness')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  internal:
    internal: true
